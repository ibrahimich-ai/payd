<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Клиент — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .client-grid { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
  @media (max-width: 1100px) { .client-grid { grid-template-columns: 1fr; } }

  .client-hero {
    background: linear-gradient(135deg, #2563eb, #8b5cf6);
    color: white;
    padding: 28px 24px;
    border-radius: var(--radius);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .client-hero::after {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 200px; height: 200px;
    background: rgba(255,255,255,.08);
    border-radius: 50%;
  }
  .client-hero .avatar { width: 80px; height: 80px; font-size: 26px; margin: 0 auto 14px; background: rgba(255,255,255,.15); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,.2); }
  .client-hero .name { font-size: 18px; font-weight: 700; line-height: 1.3; }
  .client-hero .sub { font-size: 12px; opacity: .8; margin-top: 4px; }
  .client-hero .badges { display: flex; gap: 6px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }

  .info-row { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .info-row:last-child { border-bottom: none; }
  .info-row .ic { width: 32px; height: 32px; border-radius: 8px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--text-2); flex-shrink: 0; }
  .info-row .info { flex: 1; min-width: 0; }
  .info-row .l { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; }
  .info-row .v { font-size: 13px; font-weight: 600; margin-top: 2px; }

  .deal-row { display: grid; grid-template-columns: 60px 1fr 100px 100px 60px; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; }
  .deal-row:hover { background: var(--surface-2); }
  .deal-row .num { font-weight: 700; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .deal-row .pname { font-size: 13px; font-weight: 600; }
  .deal-row .pmeta { font-size: 11px; color: var(--text-3); }
  .deal-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }

  .empty-block { padding: 40px 20px; text-align: center; color: var(--text-3); }
  .empty-block .em-title { font-size: 14px; margin-bottom: 6px; }
  .empty-block .em-sub { font-size: 12px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, .55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 540px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Карточка клиента</h1>
    <div class="desc">Полная информация и история операций</div>
  </div>
  <div class="page-head-actions">
    <button class="btn" id="cl-edit" data-no-handler="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Редактировать
    </button>
    <button class="btn" id="cl-sms" data-no-handler="true">
      SMS
    </button>
    <a href="zayavka-new.html" class="btn primary" id="cl-new-app">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Новая заявка
    </a>
  </div>
</div>

<div class="client-grid">

  <div style="display: flex; flex-direction: column; gap: 16px;">
    <div class="client-hero">
      <div class="avatar" id="hero-avatar">?</div>
      <div class="name" id="hero-name">—</div>
      <div class="sub" id="hero-sub">—</div>
      <div class="badges" id="hero-badges"></div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>Контактная информация</h3></div>
      <div id="contact-info">
        <div class="empty-block">Загрузка...</div>
      </div>
    </div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 16px;">

    <div class="stat-grid cols-3">
      <div class="stat" style="padding: 16px;">
        <div class="stat-label">Всего сделок</div>
        <div class="stat-value" id="kpi-deals">0</div>
        <div class="stat-sub" id="kpi-deals-sub">—</div>
      </div>
      <div class="stat" style="padding: 16px;">
        <div class="stat-label">Общая сумма</div>
        <div class="stat-value" style="font-size: 22px;" id="kpi-sum">0 ₽</div>
        <div class="stat-sub">по всем заявкам</div>
      </div>
      <div class="stat" style="padding: 16px;">
        <div class="stat-label">Активные</div>
        <div class="stat-value" style="font-size: 22px; color: var(--primary);" id="kpi-active">0</div>
        <div class="stat-sub">не закрытые</div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>История сделок</h3></div>
      <div id="deals-list">
        <div class="empty-block">Загрузка...</div>
      </div>
    </div>

  </div>
</div>

</div>

<!-- ============ EDIT CLIENT MODAL ============ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Редактировать клиента</h3>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">ФИО *</label>
        <input class="input" id="m-name" />
      </div>
      <div class="field">
        <label class="field-label">Телефон *</label>
        <input class="input" id="m-phone" />
      </div>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Дата рождения</label>
        <input class="input" id="m-dob" type="date" />
      </div>
      <div class="field">
        <label class="field-label">Паспорт (серия номер)</label>
        <input class="input" id="m-passport" />
      </div>
    </div>
    <div class="field" style="margin-bottom: 12px;">
      <label class="field-label">Адрес регистрации</label>
      <input class="input" id="m-address" />
    </div>
    <div class="field">
      <label class="field-label">Заметка</label>
      <textarea class="textarea" id="m-note"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="m-delete" data-no-handler="true">Удалить</button>
      <button class="btn" id="m-cancel" data-no-handler="true" style="margin-left:auto;">Отмена</button>
      <button class="btn primary" id="m-save" data-no-handler="true">Сохранить</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({
    active: 'clients',
    title: 'Клиент',
    breadcrumbs: []
  });

  const fmt = (v) => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }
  function getInitials(name) {
    const parts = (name || '').trim().split(/\s+/);
    return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || '?';
  }
  function fmtDate(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}.${pad(d.getMonth() + 1)}.${d.getFullYear()}`;
  }
  function ageFromDob(dob) {
    if (!dob) return null;
    const d = new Date(dob);
    if (isNaN(d.getTime())) return null;
    return Math.floor((Date.now() - d.getTime()) / (365.25 * 24 * 3600 * 1000));
  }

  function infoRow(icon, label, value) {
    if (!value) return '';
    return `
      <div class="info-row">
        <div class="ic">${icon}</div>
        <div class="info">
          <div class="l">${escapeHtml(label)}</div>
          <div class="v">${escapeHtml(value)}</div>
        </div>
      </div>
    `;
  }

  async function load() {
    const params = new URLSearchParams(location.search);
    const phone = params.get('phone') || '';
    const name = params.get('name') || '';

    if (!phone && !name) {
      document.getElementById('hero-name').textContent = 'Клиент не выбран';
      document.getElementById('hero-sub').textContent = 'Откройте карточку из списка клиентов';
      document.getElementById('contact-info').innerHTML = `<div class="empty-block">
        <div class="em-title">Нет данных</div>
        <div class="em-sub"><a href="clients.html" style="color:var(--primary);font-weight:600;">← К списку клиентов</a></div>
      </div>`;
      document.getElementById('deals-list').innerHTML = `<div class="empty-block"><div class="em-sub">—</div></div>`;
      return;
    }

    // Try to find manual client record
    let manual = {};
    try { manual = JSON.parse(localStorage.getItem('payd.clients.v1') || '{}'); } catch (_) {}
    const manualMatch = Object.values(manual).find(c =>
      (phone && c.phone === phone) || (name && c.name === name)
    ) || {};

    // Find applications for this client
    const apps = (await PaydDB?.list('applications').catch(() => [])) || [];
    const myApps = apps.filter(a => {
      const aPhone = a.client_phone || a.client?.phone;
      const aName = a.client_name || a.client?.name;
      return (phone && aPhone === phone) || (name && aName === name);
    });

    // Merge data: manual record takes precedence for personal info
    const firstApp = myApps[0] || {};
    const client = {
      name: manualMatch.name || name || firstApp.client_name || firstApp.client?.name || '—',
      phone: manualMatch.phone || phone || firstApp.client_phone || firstApp.client?.phone || '',
      passport: manualMatch.passport || firstApp.client_passport || '',
      address: manualMatch.address || firstApp.client_address || '',
      dob: manualMatch.dob || '',
      note: manualMatch.note || '',
      created_at: manualMatch.created_at || firstApp.ts || firstApp.created_at
    };

    renderClient(client, myApps);

    // New application button — pre-fill client info
    const btnNew = document.getElementById('cl-new-app');
    if (btnNew) {
      const url = new URL('zayavka-new.html', location.href);
      if (client.name) url.searchParams.set('name', client.name);
      if (client.phone) url.searchParams.set('phone', client.phone);
      btnNew.href = url.pathname + url.search;
    }
  }

  function renderClient(c, apps) {
    document.getElementById('hero-avatar').textContent = getInitials(c.name);
    document.getElementById('hero-name').textContent = c.name;
    const created = c.created_at ? 'Клиент с ' + fmtDate(c.created_at) : 'Новый клиент';
    document.getElementById('hero-sub').textContent = created;

    const dealCount = apps.length;
    const totalSum = apps.reduce((s, a) => s + (+(a.amount || a.calc?.price) || 0), 0);
    const activeCount = apps.filter(a => !a.closed && !a.rejected).length;

    const badges = [];
    if (dealCount >= 5) badges.push('<span class="badge" style="background: rgba(255,255,255,.2); color: white; border-color: rgba(255,255,255,.3);">⭐ VIP</span>');
    else if (dealCount >= 2) badges.push('<span class="badge" style="background: rgba(255,255,255,.2); color: white; border-color: rgba(255,255,255,.3);">Постоянный</span>');
    else if (dealCount === 1) badges.push('<span class="badge" style="background: rgba(255,255,255,.2); color: white; border-color: rgba(255,255,255,.3);">Новый</span>');
    if (dealCount > 0) badges.push(`<span class="badge" style="background: rgba(255,255,255,.2); color: white; border-color: rgba(255,255,255,.3);">${dealCount} ${dealCount === 1 ? 'сделка' : (dealCount < 5 ? 'сделки' : 'сделок')}</span>`);
    document.getElementById('hero-badges').innerHTML = badges.join('');

    // Contact info
    const I = {
      phone: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
      cal: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>',
      pin: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>',
      passport: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/></svg>',
      note: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>'
    };
    const age = ageFromDob(c.dob);
    const dobLine = c.dob ? fmtDate(c.dob) + (age ? ' (' + age + ' лет)' : '') : '';

    const rows = [
      infoRow(I.phone, 'Телефон', c.phone),
      infoRow(I.cal, 'Дата рождения', dobLine),
      infoRow(I.pin, 'Адрес', c.address),
      infoRow(I.passport, 'Паспорт', c.passport),
      infoRow(I.note, 'Заметка', c.note)
    ].filter(Boolean).join('');
    document.getElementById('contact-info').innerHTML = rows || '<div class="empty-block"><div class="em-sub">Контактные данные не заполнены</div></div>';

    // KPIs
    document.getElementById('kpi-deals').textContent = dealCount;
    document.getElementById('kpi-deals-sub').textContent = dealCount ? 'у клиента' : 'нет сделок';
    document.getElementById('kpi-sum').textContent = fmt(totalSum);
    document.getElementById('kpi-active').textContent = activeCount;

    // Deals list
    if (apps.length === 0) {
      document.getElementById('deals-list').innerHTML = `
        <div class="empty-block">
          <div class="em-title">У клиента пока нет сделок</div>
          <div class="em-sub"><a href="${document.getElementById('cl-new-app').href}" style="color:var(--primary);font-weight:600;">Создать первую заявку →</a></div>
        </div>
      `;
    } else {
      document.getElementById('deals-list').innerHTML = apps.map(a => {
        const num = '#' + (a.number || (a.id || '').slice(-6));
        const product = a.product || a.calc?.product || '—';
        const date = fmtDate(a.ts || a.created_at);
        const amount = +(a.amount || a.calc?.price) || 0;
        const status = a.rejected ? 'Отклонена' : a.closed ? 'Закрыта' : a.contractSigned ? 'Активная' : 'Новая';
        const statusCls = a.rejected ? 'danger' : a.closed ? 'gray' : a.contractSigned ? 'success' : 'primary';
        return `
          <div class="deal-row" data-id="${escapeHtml(a.id)}">
            <div class="num">${escapeHtml(num)}</div>
            <div>
              <div class="pname">${escapeHtml(product)}</div>
              <div class="pmeta">${date}</div>
            </div>
            <div class="v">${fmt(amount)}</div>
            <div><span class="badge ${statusCls}">${status}</span></div>
            <div style="text-align: right; color: var(--text-3);">→</div>
          </div>
        `;
      }).join('');
      document.querySelectorAll('.deal-row').forEach(row => {
        row.addEventListener('click', () => {
          location.href = 'zayavka.html?id=' + encodeURIComponent(row.dataset.id);
        });
      });
    }
  }

  load();
  if (window.PaydDB?.subscribe) PaydDB.subscribe('applications', load);

  // ============ Edit modal ============
  let currentClient = null;
  function setCurrentClient(c) { currentClient = c; }

  // Hook into renderClient to capture current client
  const _origRender = renderClient;
  window.renderClient = function (c, apps) {
    setCurrentClient(c);
    return _origRender(c, apps);
  };

  const modalBg = document.getElementById('modal-bg');
  function openEdit() {
    if (!currentClient) {
      // Re-load if not yet ready
      PaydApp.toast('Карточка ещё загружается, попробуйте снова', 'info');
      return;
    }
    document.getElementById('m-name').value = currentClient.name || '';
    document.getElementById('m-phone').value = currentClient.phone || '';
    document.getElementById('m-dob').value = currentClient.dob || '';
    document.getElementById('m-passport').value = currentClient.passport || '';
    document.getElementById('m-address').value = currentClient.address || '';
    document.getElementById('m-note').value = currentClient.note || '';
    modalBg.classList.add('open');
  }
  function closeEdit() { modalBg.classList.remove('open'); }

  document.getElementById('cl-edit').addEventListener('click', e => {
    e.preventDefault();
    openEdit();
  });
  document.getElementById('m-cancel').addEventListener('click', closeEdit);
  modalBg.addEventListener('click', e => { if (e.target === modalBg) closeEdit(); });

  document.getElementById('m-save').addEventListener('click', async () => {
    const name = document.getElementById('m-name').value.trim();
    const phone = document.getElementById('m-phone').value.trim();
    if (!name) { PaydApp.toast('Укажите ФИО', 'error'); return; }
    if (!phone) { PaydApp.toast('Укажите телефон', 'error'); return; }

    const updated = {
      name,
      phone,
      dob: document.getElementById('m-dob').value,
      passport: document.getElementById('m-passport').value.trim(),
      address: document.getElementById('m-address').value.trim(),
      note: document.getElementById('m-note').value.trim(),
      created_at: currentClient?.created_at || new Date().toISOString()
    };

    // Save to manual clients map (key by phone, fallback to name)
    let map = {};
    try { map = JSON.parse(localStorage.getItem('payd.clients.v1') || '{}'); } catch (_) {}

    // If old key existed, remove it (in case phone changed)
    const oldPhone = currentClient?.phone;
    const oldName = currentClient?.name;
    if (oldPhone && map[oldPhone]) delete map[oldPhone];
    else if (oldName && map[oldName]) delete map[oldName];

    map[phone || name] = updated;
    localStorage.setItem('payd.clients.v1', JSON.stringify(map));
    PaydApp.toast('Изменения сохранены', 'success');
    closeEdit();

    // Update URL with new params and reload
    const url = new URL(location.href);
    url.searchParams.set('phone', phone);
    url.searchParams.set('name', name);
    history.replaceState(null, '', url);
    load();
  });

  document.getElementById('m-delete').addEventListener('click', () => {
    PaydApp.confirmDialog({
      title: 'Удалить клиента?',
      message: 'Запись клиента будет удалена. Связанные заявки останутся в системе.',
      okText: 'Удалить',
      onOk: () => {
        let map = {};
        try { map = JSON.parse(localStorage.getItem('payd.clients.v1') || '{}'); } catch (_) {}
        const oldPhone = currentClient?.phone;
        const oldName = currentClient?.name;
        if (oldPhone) delete map[oldPhone];
        if (oldName) delete map[oldName];
        localStorage.setItem('payd.clients.v1', JSON.stringify(map));
        PaydApp.toast('Клиент удалён', 'success');
        setTimeout(() => location.href = 'clients.html', 600);
      }
    });
  });

  // ============ SMS button ============
  document.getElementById('cl-sms').addEventListener('click', () => {
    if (!currentClient?.phone) { PaydApp.toast('У клиента нет номера телефона', 'error'); return; }
    const phone = currentClient.phone.replace(/\D/g, '');
    location.href = 'sms:' + phone;
  });
</script>
</body>
</html>
