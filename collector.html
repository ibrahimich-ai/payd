<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Взыскание — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .case-row { display: grid; grid-template-columns: 60px 1fr 110px 100px 110px 100px; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: background .12s; }
  .case-row:hover { background: var(--surface-2); }
  .case-row .num { font-family: 'Courier New', monospace; font-weight: 700; }
  .case-row .name { font-weight: 700; font-size: 13px; }
  .case-row .meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .case-row .days { text-align: center; font-weight: 800; font-size: 16px; }
  .case-row .days.warn  { color: var(--warning); }
  .case-row .days.danger{ color: var(--danger); }
  .case-row .amount { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Взыскание</h1>
    <div class="desc" id="cl-desc">Просроченные платежи</div>
  </div>
</div>

<div class="stat-grid cols-4 mb-4">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего просрочек</div>
    <div class="stat-value" style="font-size: 22px; color: var(--danger);" id="kpi-total">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">До 7 дней</div>
    <div class="stat-value" style="font-size: 22px; color: var(--warning);" id="kpi-7">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">7–30 дней</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-30">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Сумма долга</div>
    <div class="stat-value" style="font-size: 18px; color: var(--danger);" id="kpi-amount">0 ₽</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-search">
    <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="cl-search" placeholder="Поиск по клиенту, номеру..." />
  </div>
</div>

<div class="card">
  <div style="background: var(--surface-2); padding: 10px 18px; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; display: grid; grid-template-columns: 60px 1fr 110px 100px 110px 100px; gap: 12px; border-bottom: 1px solid var(--border);">
    <div>№</div>
    <div>Клиент</div>
    <div style="text-align:center;">Дней</div>
    <div style="text-align:right;">Сумма</div>
    <div>Контакт</div>
    <div></div>
  </div>
  <div id="cases-list">
    <div class="empty">Загрузка...</div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'collector', title: 'Взыскание', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  let allOverdue = [];

  async function load() {
    const sb = PaydDB.cloud.sb();
    if (!sb) return;

    // Active applications (with contracts but not closed)
    const apps = await PaydDB.list('applications').catch(() => []);
    const active = apps.filter(a => !a.closed && !a.rejected);

    if (!active.length) { allOverdue = []; render(); return; }

    // Get all payments
    const { data: payments } = await sb.from('payments').select('*').in('app_id', active.map(a => a.id));
    const byApp = {};
    (payments || []).forEach(p => { byApp[p.app_id] = (byApp[p.app_id] || []).concat(p); });

    // Compute overdue: for each app, how many monthly payments should have been made by now
    const now = new Date();
    allOverdue = [];
    active.forEach(a => {
      const start = new Date(a.ts || a.created_at || now);
      if (isNaN(start.getTime())) return;
      const monthsPassed = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
      const expected = Math.max(0, monthsPassed);
      const actual = (byApp[a.id] || []).length;
      const missed = expected - actual;
      if (missed <= 0) return;
      const monthly = +(a.monthly || a.calc?.monthly) || 0;
      // Days since the first missed payment
      const lastDue = new Date(start.getFullYear(), start.getMonth() + actual + 1, start.getDate());
      const days = Math.max(1, Math.floor((now - lastDue) / (1000 * 60 * 60 * 24)));
      allOverdue.push({
        app: a, missed, days, debt: monthly * missed
      });
    });
    allOverdue.sort((a, b) => b.days - a.days);
    render();
  }

  function render() {
    const q = (document.getElementById('cl-search').value || '').toLowerCase().trim();
    const filtered = q
      ? allOverdue.filter(o => ((o.app.client_name || '') + ' ' + (o.app.number || '')).toLowerCase().includes(q))
      : allOverdue;

    const list = document.getElementById('cases-list');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" style="margin:0 auto 12px;opacity:.6;"><polyline points="20 6 9 17 4 12"/></svg>
        <div>Просрочек нет ✨</div>
        <div style="font-size:12px;margin-top:6px;">Все платежи в срок</div>
      </div>`;
    } else {
      list.innerHTML = filtered.map(o => {
        const a = o.app;
        const cls = o.days > 30 ? 'danger' : o.days > 7 ? 'warn' : '';
        const phone = a.client_phone || a.client?.phone || '';
        return `
          <div class="case-row" data-id="${escapeHtml(a.id)}">
            <div class="num">#${escapeHtml(a.number || '')}</div>
            <div>
              <div class="name">${escapeHtml(a.client_name || a.client?.name || '—')}</div>
              <div class="meta">${escapeHtml(a.product || '')}</div>
            </div>
            <div class="days ${cls}">${o.days}</div>
            <div class="amount">${fmt(o.debt)}</div>
            <div>${phone ? `<a href="tel:${escapeHtml(phone)}" style="color:var(--primary);font-size:12px;">${escapeHtml(phone)}</a>` : '—'}</div>
            <div style="text-align:right;color:var(--text-3);">→</div>
          </div>
        `;
      }).join('');
      list.querySelectorAll('.case-row').forEach(r => {
        r.addEventListener('click', () => location.href = 'zayavka.html?id=' + encodeURIComponent(r.dataset.id));
      });
    }

    document.getElementById('kpi-total').textContent = allOverdue.length;
    document.getElementById('kpi-7').textContent = allOverdue.filter(o => o.days <= 7).length;
    document.getElementById('kpi-30').textContent = allOverdue.filter(o => o.days > 7 && o.days <= 30).length;
    document.getElementById('kpi-amount').textContent = fmt(allOverdue.reduce((s, o) => s + o.debt, 0));
    document.getElementById('cl-desc').textContent = 'Просроченные платежи · ' + allOverdue.length + ' клиентов';
  }

  document.getElementById('cl-search').addEventListener('input', render);

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
