<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Договор — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .doc-grid { display: grid; grid-template-columns: 1fr 340px; gap: 16px; }
  @media (max-width: 1300px) { .doc-grid { grid-template-columns: 1fr; } }
  .paper { background: white; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 60px 80px; font-family: 'Times New Roman', Georgia, serif; line-height: 1.8; font-size: 14px; color: #1a2332; }
  @media (max-width: 800px) { .paper { padding: 30px 20px; } }
  .paper h1 { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 6px; letter-spacing: .04em; }
  .paper .center { text-align: center; margin-bottom: 22px; color: var(--text-2); font-size: 13px; }
  .paper h2 { font-size: 14px; font-weight: 700; margin: 18px 0 8px; }
  .paper p { margin: 8px 0; }
  .paper table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
  .paper table th, .paper table td { border: 1px solid #1a2332; padding: 8px; text-align: left; }
  .paper .sign { display: flex; justify-content: space-between; margin-top: 40px; }
  .paper .sign-block { width: 45%; }
  .paper .sign-line { border-bottom: 1px solid #1a2332; margin: 30px 0 6px; }
  .ct-side { display: flex; flex-direction: column; gap: 16px; }
  .ct-status-card { padding: 18px; }
  .ct-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
  .ct-row .l { color: var(--text-2); }
  .ct-row .v { font-weight: 600; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1 id="page-title">Договор</h1>
    <div class="desc" id="page-desc">Загрузка...</div>
  </div>
  <div class="page-head-actions">
    <button class="btn" onclick="window.print()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Печать
    </button>
    <button class="btn primary" id="btn-sign" data-no-handler="true" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>
      Подписать
    </button>
  </div>
</div>

<div class="doc-grid">
  <div class="paper" id="paper">Загрузка...</div>

  <div class="ct-side">
    <div class="card ct-status-card">
      <div style="font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px;">Статус</div>
      <div id="status-block">—</div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>Параметры</h3></div>
      <div style="padding: 12px 18px;" id="params-block">—</div>
    </div>

    <div class="card">
      <div class="card-hd"><h3>Документы</h3></div>
      <div style="padding: 14px 18px;" id="docs-host"></div>
    </div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'contracts', title: 'Договор', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  const fmtDate = iso => { const d = new Date(iso); if (isNaN(d.getTime())) return '—'; const p = n => String(n).padStart(2, '0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`; };
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  const params = new URLSearchParams(location.search);
  const ctId = params.get('id');

  let contract = null;
  let app = null;

  async function load() {
    if (!ctId) {
      document.getElementById('paper').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3);">Договор не указан. <a href="contracts.html" style="color:var(--primary);">К списку →</a></div>';
      return;
    }
    const sb = window.PaydDB?.cloud?.sb?.();
    if (!sb) {
      document.getElementById('paper').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3);">Войдите в облако чтобы открыть договор</div>';
      return;
    }
    try {
      const { data: c } = await sb.from('contracts').select('*').eq('id', ctId).maybeSingle();
      if (!c) {
        document.getElementById('paper').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-3);">Договор не найден. <a href="contracts.html" style="color:var(--primary);">К списку →</a></div>';
        return;
      }
      contract = c;
      const apps = await PaydDB.list('applications').catch(() => []);
      app = apps.find(a => a.id === c.app_id) || {};
      render();
    } catch (e) {
      document.getElementById('paper').innerHTML = '<div style="padding:40px;text-align:center;color:var(--danger);">Ошибка: ' + escapeHtml(e.message) + '</div>';
    }
  }

  function render() {
    const TYPE_TITLES = { murabaha: 'ДОГОВОР МУРАБАХА', standard: 'ДОГОВОР РАССРОЧКИ', ijara: 'ДОГОВОР ИДЖАРА' };
    const STATUS_LABELS = { draft: 'Черновик', signed: 'Подписан', terminated: 'Расторгнут' };
    const STATUS_CLS = { draft: 'primary', signed: 'success', terminated: 'danger' };

    document.getElementById('page-title').textContent = 'Договор № ' + contract.number;
    document.getElementById('page-desc').textContent = (TYPE_TITLES[contract.type] || 'Договор') + ' · ' + STATUS_LABELS[contract.status];

    const sale = +(app.amount || app.calc?.price) || 0;
    const down = +(app.down_payment || app.calc?.dpAmount) || 0;
    const term = app.term || app.calc?.term || 0;
    const monthly = app.monthly || app.calc?.monthly || 0;

    // Print-ready paper
    document.getElementById('paper').innerHTML = `
      <h1>${TYPE_TITLES[contract.type] || 'ДОГОВОР'}</h1>
      <div class="center">№ ${escapeHtml(contract.number)} от ${fmtDate(contract.signed_at || contract.created_at)}</div>

      <p><strong>ООО «Payd»</strong>, далее «Продавец», в лице директора Джабраилова И. Магомедовича, действующего на основании Устава, с одной стороны, и</p>
      <p><strong>${escapeHtml(app.client_name || app.client?.name || '_______________')}</strong>, далее «Покупатель», паспорт ${escapeHtml(app.client_passport || '_______')}, с другой стороны, заключили настоящий договор о нижеследующем:</p>

      <h2>1. Предмет договора</h2>
      <p>1.1. Продавец передаёт в собственность Покупателю товар: <strong>${escapeHtml(app.product || '—')}</strong>.</p>
      <p>1.2. Цена товара составляет <strong>${fmt(sale)}</strong>.</p>

      <h2>2. Условия оплаты</h2>
      <table>
        <tr><th>Параметр</th><th>Значение</th></tr>
        <tr><td>Цена товара</td><td>${fmt(sale)}</td></tr>
        <tr><td>Первоначальный взнос</td><td>${fmt(down)}</td></tr>
        <tr><td>Срок рассрочки</td><td>${term} мес.</td></tr>
        <tr><td>Ежемесячный платёж</td><td>${fmt(monthly)}</td></tr>
        <tr><td>Итого к оплате</td><td><strong>${fmt(sale)}</strong></td></tr>
      </table>

      <h2>3. Шариатская оговорка</h2>
      <p>3.1. Договор соответствует принципам исламского финансирования (Мурабаха): надбавка раскрыта в момент сделки, штрафные проценты не применяются, сумма долга не увеличивается при просрочке.</p>

      <h2>4. Порядок передачи</h2>
      <p>4.1. Товар передаётся Покупателю после оплаты первоначального взноса и подписания настоящего договора.</p>

      <h2>5. Реквизиты сторон</h2>
      <div class="sign">
        <div class="sign-block">
          <strong>Продавец:</strong><br>
          ООО «Payd»<br>
          ИНН ____________<br>
          <div class="sign-line"></div>
          Директор / М.П.
        </div>
        <div class="sign-block">
          <strong>Покупатель:</strong><br>
          ${escapeHtml(app.client_name || '_______________')}<br>
          ${escapeHtml(app.client_phone || '_______________')}<br>
          <div class="sign-line"></div>
          Подпись
        </div>
      </div>
    `;

    // Right column
    document.getElementById('status-block').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:42px;height:42px;border-radius:10px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--text);">${(STATUS_LABELS[contract.status] || '?')[0]}</div>
        <div>
          <div style="font-size:14px;font-weight:700;">${STATUS_LABELS[contract.status] || contract.status}</div>
          <div style="font-size:11px;color:var(--text-3);">${contract.signed_at ? 'подписан ' + fmtDate(contract.signed_at) : 'создан ' + fmtDate(contract.created_at)}</div>
        </div>
      </div>
    `;

    document.getElementById('params-block').innerHTML = `
      <div class="ct-row"><span class="l">Номер</span><span class="v">${escapeHtml(contract.number)}</span></div>
      <div class="ct-row"><span class="l">Тип</span><span class="v">${TYPE_TITLES[contract.type] || contract.type}</span></div>
      <div class="ct-row"><span class="l">Заявка</span><span class="v">${app.number ? '<a href="zayavka.html?id=' + encodeURIComponent(app.id) + '">#' + app.number + '</a>' : '—'}</span></div>
      <div class="ct-row"><span class="l">Клиент</span><span class="v">${escapeHtml(app.client_name || '—')}</span></div>
      <div class="ct-row"><span class="l">Сумма</span><span class="v">${fmt(sale)}</span></div>
      <div class="ct-row"><span class="l">Срок</span><span class="v">${term} мес</span></div>
    `;

    if (contract.status === 'draft') {
      document.getElementById('btn-sign').style.display = '';
    }

    // Attachments widget
    if (window.PaydApp?.mountAttachments) {
      window.PaydApp.mountAttachments(document.getElementById('docs-host'), 'contract', contract.id, 'contract');
    }
  }

  document.getElementById('btn-sign').addEventListener('click', () => {
    PaydApp.confirmDialog({
      title: 'Подписать договор?',
      message: 'Договор будет переведён в статус «Подписан». Изменения внести нельзя будет.',
      okText: 'Подписать',
      onOk: async () => {
        const sb = PaydDB.cloud.sb();
        const { error } = await sb.from('contracts').update({
          status: 'signed', signed_at: new Date().toISOString(), signed_by: 'paper'
        }).eq('id', contract.id);
        if (error) { PaydApp.toast(error.message, 'error'); return; }
        await PaydDB.audit.log(app.id, 'contract.signed', { contract_id: contract.id });
        PaydApp.toast('Договор подписан', 'success');
        load();
      }
    });
  });

  load();
</script>
</body>
</html>
