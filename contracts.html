<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Договоры — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .ct-row { display: grid; grid-template-columns: 130px 1fr 130px 110px 110px 80px; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: background .12s; }
  .ct-row:hover { background: var(--surface-2); }
  .ct-row .num { font-weight: 700; font-family: 'Courier New', monospace; }
  .ct-row .client { font-size: 13px; font-weight: 600; }
  .ct-row .meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Договоры</h1>
    <div class="desc" id="ct-desc">Все договоры рассрочки</div>
  </div>
</div>

<div class="stat-grid cols-4 mb-5">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-total">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--success);">Подписаны</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-signed">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--primary);">Черновик</div>
    <div class="stat-value" style="font-size: 22px; color: var(--primary);" id="kpi-draft">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--danger);">Расторгнут</div>
    <div class="stat-value" style="font-size: 22px; color: var(--danger);" id="kpi-terminated">0</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-search">
    <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="ct-search" placeholder="Поиск по номеру, клиенту..." />
  </div>
  <div class="filter-extras">
    <select id="ct-status">
      <option value="all">Все статусы</option>
      <option value="signed">Подписан</option>
      <option value="draft">Черновик</option>
      <option value="terminated">Расторгнут</option>
    </select>
  </div>
</div>

<div class="card">
  <div style="background: var(--surface-2); padding: 10px 18px; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; display: grid; grid-template-columns: 130px 1fr 130px 110px 110px 80px; gap: 12px; border-bottom: 1px solid var(--border);">
    <div>Номер</div>
    <div>Клиент / товар</div>
    <div>Тип</div>
    <div>Сумма</div>
    <div>Статус</div>
    <div></div>
  </div>
  <div id="ct-tbody"><div class="empty">Загрузка...</div></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'contracts', title: 'Договоры', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  const fmtDate = iso => { const d = new Date(iso); if (isNaN(d.getTime())) return '—'; const p = n => String(n).padStart(2, '0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`; };
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  const TYPE_LABELS = { murabaha: 'Мурабаха', standard: 'Стандарт', ijara: 'Иджара' };
  const STATUS_LABELS = { draft: 'Черновик', signed: 'Подписан', terminated: 'Расторгнут' };
  const STATUS_CLASS = { draft: 'primary', signed: 'success', terminated: 'danger' };

  let allContracts = [];
  let appsById = {};

  async function load() {
    const sb = window.PaydDB?.cloud?.sb?.();
    if (!sb) { renderEmpty('Войдите в облако чтобы увидеть договоры'); return; }
    try {
      const [{ data: contracts }, apps] = await Promise.all([
        sb.from('contracts').select('*').order('created_at', { ascending: false }),
        PaydDB.list('applications').catch(() => [])
      ]);
      allContracts = contracts || [];
      appsById = {};
      apps.forEach(a => { appsById[a.id] = a; });
      render();
    } catch (e) { renderEmpty('Ошибка загрузки: ' + e.message); }
  }

  function applyFilters() {
    const q = (document.getElementById('ct-search').value || '').toLowerCase().trim();
    const status = document.getElementById('ct-status').value;
    return allContracts.filter(c => {
      if (status !== 'all' && c.status !== status) return false;
      if (q) {
        const app = appsById[c.app_id] || {};
        const blob = (c.number + ' ' + (app.client_name || '') + ' ' + (app.product || '')).toLowerCase();
        if (!blob.includes(q)) return false;
      }
      return true;
    });
  }

  function renderEmpty(msg) {
    document.getElementById('ct-tbody').innerHTML = `<div class="empty">${escapeHtml(msg)}</div>`;
  }

  function render() {
    const filtered = applyFilters();
    const tbody = document.getElementById('ct-tbody');

    if (!filtered.length) {
      tbody.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.4;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div>${allContracts.length ? 'Ничего не нашли' : 'Договоров пока нет'}</div>
        <div style="font-size:12px;margin-top:6px;">${allContracts.length ? '' : 'Договоры создаются автоматически на этапе подписания заявки'}</div>
      </div>`;
    } else {
      tbody.innerHTML = filtered.map(c => {
        const app = appsById[c.app_id] || {};
        return `
          <div class="ct-row" data-id="${escapeHtml(c.id)}">
            <div class="num">${escapeHtml(c.number)}</div>
            <div>
              <div class="client">${escapeHtml(app.client_name || '—')}</div>
              <div class="meta">${escapeHtml(app.product || '—')}</div>
            </div>
            <div><span class="badge primary">${TYPE_LABELS[c.type] || c.type || '—'}</span></div>
            <div style="font-weight:700;font-variant-numeric:tabular-nums;">${app.amount ? fmt(app.amount) : '—'}</div>
            <div><span class="badge ${STATUS_CLASS[c.status] || 'gray'}">${STATUS_LABELS[c.status] || c.status}</span></div>
            <div style="text-align:right;color:var(--text-3);">→</div>
          </div>
        `;
      }).join('');
      tbody.querySelectorAll('.ct-row').forEach(r => r.addEventListener('click', () => location.href = 'contract.html?id=' + encodeURIComponent(r.dataset.id)));
    }

    document.getElementById('kpi-total').textContent = allContracts.length;
    document.getElementById('kpi-signed').textContent = allContracts.filter(c => c.status === 'signed').length;
    document.getElementById('kpi-draft').textContent = allContracts.filter(c => c.status === 'draft').length;
    document.getElementById('kpi-terminated').textContent = allContracts.filter(c => c.status === 'terminated').length;
    document.getElementById('ct-desc').textContent = 'Все договоры · ' + allContracts.length + ' шт.';
  }

  document.getElementById('ct-search').addEventListener('input', render);
  document.getElementById('ct-status').addEventListener('change', render);

  load();
  setInterval(load, 15000);
</script>
</body>
</html>
