<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сотрудники — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .emp-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: all .15s; }
  .emp-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .emp-head { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .emp-name { font-size: 14px; font-weight: 700; }
  .emp-pos { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .emp-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 11px; }
  .emp-stats .l { color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; font-size: 10px; }
  .emp-stats .v { font-weight: 700; margin-top: 2px; font-size: 13px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 540px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Сотрудники</h1>
    <div class="desc" id="emp-desc">База сотрудников</div>
  </div>
  <div class="page-head-actions">
    <button class="btn primary" id="btn-new-emp" data-no-handler="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Новый сотрудник
    </button>
  </div>
</div>

<div class="stat-grid cols-4 mb-5">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего сотрудников</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-total">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Активные</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-active">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">По ролям</div>
    <div class="stat-value" style="font-size: 14px;" id="kpi-roles">—</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">ФОТ (план)</div>
    <div class="stat-value" style="font-size: 18px; color: var(--purple);" id="kpi-fot">0 ₽</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-search">
    <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="emp-search" placeholder="Поиск по ФИО, должности, отделу..." />
  </div>
</div>

<div class="emp-grid" id="emp-grid">
  <div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--text-3);">Загрузка...</div>
</div>

</div>

<div class="modal-bg" id="emp-modal">
  <div class="modal">
    <h3 id="emp-modal-title">Сотрудник</h3>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">ФИО *</label>
        <input class="input" id="m-name" placeholder="Иванов Иван Иванович" />
      </div>
      <div class="field">
        <label class="field-label">Роль *</label>
        <select class="select" id="m-role">
          <option value="manager">Менеджер</option>
          <option value="cashier">Кассир</option>
          <option value="sb">СБ</option>
          <option value="collector">Взыскание</option>
          <option value="inkassator">Инкассатор</option>
          <option value="warehouse">Склад</option>
          <option value="admin">Администратор</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="field"><label class="field-label">Должность</label><input class="input" id="m-position" placeholder="Старший менеджер" /></div>
      <div class="field"><label class="field-label">Отдел</label><input class="input" id="m-department" placeholder="Продажи" /></div>
    </div>
    <div class="modal-row">
      <div class="field"><label class="field-label">Телефон</label><input class="input" id="m-phone" placeholder="+7 ___ ___-__-__" /></div>
      <div class="field"><label class="field-label">Дата рождения</label><input class="input" id="m-birthday" type="date" /></div>
    </div>
    <div class="modal-row">
      <div class="field"><label class="field-label">Принят</label><input class="input" id="m-hired" type="date" /></div>
      <div class="field"><label class="field-label">Оклад (₽)</label><input class="input" id="m-salary" type="number" placeholder="0" /></div>
    </div>
    <div class="field" style="margin-bottom: 12px;">
      <label class="field-label">Заметки</label>
      <textarea class="textarea" id="m-notes" placeholder="Любая дополнительная информация"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="m-delete" data-no-handler="true" style="display:none;">Деактивировать</button>
      <button class="btn" id="m-cancel" data-no-handler="true" style="margin-left:auto;">Отмена</button>
      <button class="btn primary" id="m-save" data-no-handler="true">Сохранить</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'employees', title: 'Сотрудники', breadcrumbs: [] });

  const ROLE_LABELS = {
    admin: 'Администратор', manager: 'Менеджер', cashier: 'Кассир',
    sb: 'СБ', collector: 'Взыскание', inkassator: 'Инкассатор',
    warehouse: 'Склад', partner: 'Партнёр', client: 'Клиент'
  };
  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }
  function getInitials(n) { const p = (n || '').trim().split(/\s+/); return ((p[0]?.[0] || '') + (p[1]?.[0] || '')).toUpperCase() || '?'; }

  let editingId = null;
  let allEmployees = [];

  async function loadEmployees() {
    if (!window.PaydDB?.cloud?.isOnline?.()) return [];
    const sb = PaydDB.cloud.sb();
    if (!sb) return [];
    const { data } = await sb.from('profiles').select('*').order('full_name');
    return data || [];
  }

  async function refresh() {
    allEmployees = await loadEmployees();
    render();
  }

  function render() {
    const q = (document.getElementById('emp-search').value || '').toLowerCase().trim();
    const filtered = q
      ? allEmployees.filter(e => (e.full_name || '').toLowerCase().includes(q)
        || (e.position || '').toLowerCase().includes(q)
        || (e.department || '').toLowerCase().includes(q))
      : allEmployees;

    const grid = document.getElementById('emp-grid');
    if (!filtered.length) {
      grid.innerHTML = `
        <div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--text-3);">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.4;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <div>${q ? 'Никого не нашли' : 'Сотрудников пока нет'}</div>
          <div style="font-size:12px;margin-top:6px;">Сотрудники создаются через Supabase Authentication → Users.<br>После создания auth-аккаунта здесь появится профиль для редактирования.</div>
        </div>`;
    } else {
      const colors = ['c1','c2','c3','c4','c5','c6','c7'];
      grid.innerHTML = filtered.map((e, i) => `
        <div class="emp-card" data-id="${escapeHtml(e.id)}">
          <div class="emp-head">
            <div class="avatar ${colors[i % colors.length]} lg">${getInitials(e.full_name)}</div>
            <div style="flex:1;min-width:0;">
              <div class="emp-name">${escapeHtml(e.full_name || '—')}</div>
              <div class="emp-pos">${escapeHtml(e.position || ROLE_LABELS[e.role] || e.role || '—')}</div>
              <div style="margin-top:4px;"><span class="badge ${e.active === false ? 'gray' : 'success'}">${e.active === false ? 'Неактивен' : 'Активный'}</span></div>
            </div>
          </div>
          <div class="emp-stats">
            <div><div class="l">Роль</div><div class="v">${escapeHtml(ROLE_LABELS[e.role] || e.role || '—')}</div></div>
            <div><div class="l">Оклад</div><div class="v">${e.base_salary ? fmt(e.base_salary) : '—'}</div></div>
          </div>
        </div>
      `).join('');
      grid.querySelectorAll('.emp-card').forEach(c => c.addEventListener('click', () => openEdit(c.dataset.id)));
    }

    document.getElementById('kpi-total').textContent = allEmployees.length;
    document.getElementById('kpi-active').textContent = allEmployees.filter(e => e.active !== false).length;
    const roleCounts = {};
    allEmployees.forEach(e => { roleCounts[e.role] = (roleCounts[e.role] || 0) + 1; });
    document.getElementById('kpi-roles').textContent = Object.entries(roleCounts)
      .map(([r, n]) => `${ROLE_LABELS[r] || r}: ${n}`).slice(0, 3).join(' · ') || '—';
    const fot = allEmployees.filter(e => e.active !== false).reduce((s, e) => s + (+e.base_salary || 0), 0);
    document.getElementById('kpi-fot').textContent = fmt(fot);
    document.getElementById('emp-desc').textContent = 'База сотрудников · ' + allEmployees.length + ' чел.';
  }

  const modal = document.getElementById('emp-modal');
  function openNew() {
    PaydApp.toast('Сначала создай auth-аккаунт в Supabase Dashboard → Authentication → Users → Add user', { type: 'info', subtitle: 'После этого профиль появится здесь и его можно отредактировать' });
  }
  function openEdit(id) {
    const e = allEmployees.find(x => x.id === id);
    if (!e) return;
    editingId = id;
    document.getElementById('emp-modal-title').textContent = 'Сотрудник: ' + (e.full_name || '');
    document.getElementById('m-delete').style.display = '';
    document.getElementById('m-name').value = e.full_name || '';
    document.getElementById('m-position').value = e.position || '';
    document.getElementById('m-department').value = e.department || '';
    document.getElementById('m-phone').value = e.phone || '';
    document.getElementById('m-birthday').value = e.birthday || '';
    document.getElementById('m-hired').value = e.hired_at || '';
    document.getElementById('m-salary').value = e.base_salary || '';
    document.getElementById('m-notes').value = e.notes || '';
    document.getElementById('m-role').value = e.role || 'manager';
    modal.classList.add('open');
  }

  document.getElementById('btn-new-emp').addEventListener('click', openNew);
  document.getElementById('m-cancel').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
  document.getElementById('emp-search').addEventListener('input', render);

  document.getElementById('m-save').addEventListener('click', async () => {
    if (!editingId) return;
    const data = {
      full_name: document.getElementById('m-name').value.trim(),
      role: document.getElementById('m-role').value,
      position: document.getElementById('m-position').value.trim() || null,
      department: document.getElementById('m-department').value.trim() || null,
      phone: document.getElementById('m-phone').value.trim() || null,
      birthday: document.getElementById('m-birthday').value || null,
      hired_at: document.getElementById('m-hired').value || null,
      base_salary: +document.getElementById('m-salary').value || null,
      notes: document.getElementById('m-notes').value.trim() || null
    };
    if (!data.full_name) { PaydApp.toast('Укажите ФИО', 'error'); return; }
    const sb = PaydDB.cloud.sb();
    try {
      const { error } = await sb.from('profiles').update(data).eq('id', editingId);
      if (error) throw error;
      PaydApp.toast('Сотрудник обновлён', 'success');
      modal.classList.remove('open');
      refresh();
    } catch (err) { PaydApp.toast('Ошибка: ' + err.message, 'error'); }
  });

  document.getElementById('m-delete').addEventListener('click', () => {
    if (!editingId) return;
    PaydApp.confirmDialog({
      title: 'Деактивировать сотрудника?',
      message: 'Сотрудник пометится как неактивный. Полное удаление — только в Supabase Dashboard.',
      okText: 'Деактивировать',
      onOk: async () => {
        const sb = PaydDB.cloud.sb();
        await sb.from('profiles').update({ active: false, fired_at: new Date().toISOString().slice(0, 10) }).eq('id', editingId);
        modal.classList.remove('open');
        PaydApp.toast('Сотрудник деактивирован', 'success');
        refresh();
      }
    });
  });

  refresh();
  setInterval(refresh, 15000);
</script>
</body>
</html>
