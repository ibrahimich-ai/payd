<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Инкассатор — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .ink-grid { display: grid; grid-template-columns: 1fr 360px; gap: 16px; }
  @media (max-width: 1100px) { .ink-grid { grid-template-columns: 1fr; } }

  .stop { display: grid; grid-template-columns: 60px 1fr 110px 100px 130px; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); align-items: center; }
  .stop:last-child { border-bottom: none; }
  .stop .num { font-size: 20px; font-weight: 800; color: var(--text-3); text-align: center; }
  .stop.done .num { color: var(--success); }
  .stop.skipped .num { color: var(--danger); text-decoration: line-through; }
  .stop .who { font-size: 13px; font-weight: 700; }
  .stop .meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .stop .dir-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: .04em; text-align: center; }
  .dir-badge.deliver { background: var(--success-soft); color: var(--success); }
  .dir-badge.pickup  { background: var(--primary-soft); color: var(--primary); }
  .stop .amount { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
  .stop .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .stop .actions .btn { padding: 6px 10px; font-size: 11px; }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 480px; width: 100%; padding: 24px; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Маршрут инкассатора</h1>
    <div class="desc" id="ink-desc">Сегодня</div>
  </div>
  <div class="page-head-actions">
    <button class="btn primary" id="btn-add" data-no-handler="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Добавить точку
    </button>
  </div>
</div>

<div class="stat-grid cols-4 mb-4">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего точек</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-total">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--success);">Выполнено</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-done">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--primary);">Ожидают</div>
    <div class="stat-value" style="font-size: 22px; color: var(--primary);" id="kpi-pending">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Сумма к выдаче</div>
    <div class="stat-value" style="font-size: 18px; color: var(--purple);" id="kpi-amount">0 ₽</div>
  </div>
</div>

<div class="ink-grid">
  <div class="card">
    <div style="background: var(--surface-2); padding: 10px 18px; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; display: grid; grid-template-columns: 60px 1fr 110px 100px 130px; gap: 12px; border-bottom: 1px solid var(--border);">
      <div style="text-align:center;">№</div>
      <div>Партнёр / адрес</div>
      <div>Тип</div>
      <div style="text-align:right;">Сумма</div>
      <div></div>
    </div>
    <div id="stops-list">
      <div class="empty">Загрузка...</div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd"><h3>Сводка дня</h3></div>
    <div style="padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;"><span class="text-muted">Доставить партнёрам</span><span style="font-weight:700;" id="sum-deliver">0 ₽</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;"><span class="text-muted">Забрать у партнёров</span><span style="font-weight:700;" id="sum-pickup">0 ₽</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;border-top:1px dashed var(--border);padding-top:10px;"><span style="font-weight:700;">Итого оборот</span><span style="font-weight:800;color:var(--primary);" id="sum-total">0 ₽</span></div>
    </div>
  </div>
</div>

</div>

<div class="modal-bg" id="stop-modal">
  <div class="modal">
    <h3 id="stop-modal-title">Новая точка маршрута</h3>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Партнёр *</label>
        <select class="select" id="m-partner"></select>
      </div>
      <div class="field">
        <label class="field-label">Тип *</label>
        <select class="select" id="m-dir">
          <option value="deliver">Доставить (к партнёру)</option>
          <option value="pickup">Забрать (от партнёра)</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Сумма (₽) *</label>
        <input class="input" id="m-amount" type="number" placeholder="0" />
      </div>
      <div class="field">
        <label class="field-label">Время</label>
        <input class="input" id="m-time" type="time" />
      </div>
    </div>
    <div class="field" style="margin-bottom: 12px;">
      <label class="field-label">Заметка</label>
      <input class="input" id="m-note" placeholder="Например: 5 заявок · комиссии за апрель" />
    </div>
    <div class="modal-actions">
      <button class="btn" id="m-cancel" data-no-handler="true">Отмена</button>
      <button class="btn primary" id="m-save" data-no-handler="true">Сохранить</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'inkassator', title: 'Инкассатор', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  let allStops = [];
  let allPartners = [];
  const today = new Date().toISOString().slice(0, 10);

  async function load() {
    const sb = PaydDB.cloud.sb();
    if (!sb) return;
    const [{ data: stops }, partners] = await Promise.all([
      sb.from('inkassator_stops').select('*').eq('shift_date', today).order('planned_at'),
      PaydDB.list('partners').catch(() => [])
    ]);
    allStops = stops || [];
    allPartners = partners.filter(p => p.status !== 'danger');
    render();
  }

  function render() {
    const list = document.getElementById('stops-list');
    if (!allStops.length) {
      list.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin:0 auto 12px;opacity:.4;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>
        <div>Точек на сегодня нет</div>
        <div style="font-size:12px;margin-top:6px;">Нажми «Добавить точку»</div>
      </div>`;
    } else {
      list.innerHTML = allStops.map((s, i) => {
        const partner = allPartners.find(p => p.id === s.partner_id || p.name === s.recipient);
        const partnerName = partner?.name || s.recipient || '—';
        const partnerAddr = partner?.address || '';
        const stCls = s.status === 'done' ? 'done' : s.status === 'skip' ? 'skipped' : '';
        return `
          <div class="stop ${stCls}" data-id="${escapeHtml(s.id)}">
            <div class="num">${i + 1}</div>
            <div>
              <div class="who">${escapeHtml(partnerName)}</div>
              <div class="meta">${escapeHtml(partnerAddr || s.note || '')} ${s.planned_at ? '· ' + s.planned_at : ''}</div>
            </div>
            <div><span class="dir-badge ${s.dir}">${s.dir === 'deliver' ? 'Доставить' : 'Забрать'}</span></div>
            <div class="amount">${fmt(s.amount)}</div>
            <div class="actions">
              ${s.status === 'pending' || !s.status
                ? `<button class="btn sm primary" data-act="done" data-no-handler="true">✓ Готово</button>
                   <button class="btn sm" data-act="skip" data-no-handler="true">пропустить</button>`
                : `<span class="badge ${s.status === 'done' ? 'success' : 'danger'}">${s.status === 'done' ? 'Выполнено' : 'Пропущено'}</span>
                   <button class="btn sm" data-act="reset" data-no-handler="true">↶</button>`}
            </div>
          </div>
        `;
      }).join('');
      list.querySelectorAll('[data-act]').forEach(btn => {
        btn.addEventListener('click', () => {
          const stop = btn.closest('.stop');
          const id = stop.dataset.id;
          const act = btn.dataset.act;
          updateStop(id, act === 'done' ? 'done' : act === 'skip' ? 'skip' : 'pending');
        });
      });
    }

    const done = allStops.filter(s => s.status === 'done').length;
    const pending = allStops.filter(s => !s.status || s.status === 'pending').length;
    const totalAmount = allStops.reduce((s, x) => s + (+x.amount || 0), 0);
    const deliver = allStops.filter(s => s.dir === 'deliver').reduce((s, x) => s + (+x.amount || 0), 0);
    const pickup = allStops.filter(s => s.dir === 'pickup').reduce((s, x) => s + (+x.amount || 0), 0);

    document.getElementById('kpi-total').textContent = allStops.length;
    document.getElementById('kpi-done').textContent = done;
    document.getElementById('kpi-pending').textContent = pending;
    document.getElementById('kpi-amount').textContent = fmt(totalAmount);
    document.getElementById('sum-deliver').textContent = fmt(deliver);
    document.getElementById('sum-pickup').textContent = fmt(pickup);
    document.getElementById('sum-total').textContent = fmt(totalAmount);
    document.getElementById('ink-desc').textContent = 'Сегодня · ' + allStops.length + ' точек, выполнено ' + done;
  }

  async function updateStop(id, status) {
    const sb = PaydDB.cloud.sb();
    const upd = { status };
    if (status === 'done') upd.confirmed_at = new Date().toISOString();
    await sb.from('inkassator_stops').update(upd).eq('id', id);
    PaydApp.toast(status === 'done' ? 'Точка выполнена' : status === 'skip' ? 'Пропущена' : 'Сброшено', 'info');
    load();
  }

  // Modal
  const modal = document.getElementById('stop-modal');
  document.getElementById('btn-add').addEventListener('click', () => {
    const sel = document.getElementById('m-partner');
    sel.innerHTML = allPartners.map(p => `<option value="${escapeHtml(p.id || p.name)}">${escapeHtml(p.name)}${p.address ? ' — ' + escapeHtml(p.address) : ''}</option>`).join('');
    document.getElementById('m-amount').value = '';
    document.getElementById('m-time').value = '';
    document.getElementById('m-note').value = '';
    document.getElementById('m-dir').value = 'deliver';
    modal.classList.add('open');
  });
  document.getElementById('m-cancel').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  document.getElementById('m-save').addEventListener('click', async () => {
    const partnerVal = document.getElementById('m-partner').value;
    const amount = +document.getElementById('m-amount').value;
    if (!partnerVal) { PaydApp.toast('Выберите партнёра', 'error'); return; }
    if (!amount) { PaydApp.toast('Введите сумму', 'error'); return; }

    const partner = allPartners.find(p => p.id === partnerVal || p.name === partnerVal);
    const sb = PaydDB.cloud.sb();
    const data = {
      shift_date: today,
      partner_id: partner?.id && /^[0-9a-f-]{36}$/i.test(partner.id) ? partner.id : null,
      recipient: partner?.name || partnerVal,
      dir: document.getElementById('m-dir').value,
      amount,
      planned_at: document.getElementById('m-time').value || null,
      status: 'pending',
      note: document.getElementById('m-note').value.trim() || null
    };
    try {
      const { error } = await sb.from('inkassator_stops').insert(data);
      if (error) throw error;
      PaydApp.toast('Точка добавлена', 'success');
      modal.classList.remove('open');
      load();
    } catch (err) { PaydApp.toast('Ошибка: ' + err.message, 'error'); }
  });

  load();
  setInterval(load, 15000);
</script>
</body>
</html>
