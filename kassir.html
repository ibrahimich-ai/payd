<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Касса — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .kk-grid { display: grid; grid-template-columns: 380px 1fr 340px; gap: 16px; }
  @media (max-width: 1300px) { .kk-grid { grid-template-columns: 1fr; } }

  .search-card { padding: 20px; }
  .search-card .lbl { font-size: 12px; color: var(--text-2); margin-bottom: 8px; font-weight: 600; }
  .search-card input { font-size: 16px; padding: 14px 16px; }

  .pay-card { padding: 24px; }
  .pay-empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
  .pay-app-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .pay-app-head .num { font-size: 13px; color: var(--text-3); }
  .pay-app-head .client { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .pay-app-head .product { font-size: 12px; color: var(--text-2); margin-top: 4px; }

  .pay-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
  .pay-row .l { color: var(--text-2); }
  .pay-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }
  .pay-row.big { font-size: 17px; padding: 12px 0; border-top: 1px dashed var(--border); margin-top: 8px; }
  .pay-row.big .v { color: var(--primary); font-size: 22px; font-weight: 800; }

  .amount-input { font-size: 28px; font-weight: 800; padding: 16px 20px; text-align: right; font-variant-numeric: tabular-nums; }

  .method-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 14px 0; }
  .method-btn { padding: 12px; text-align: center; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .12s; background: var(--surface); }
  .method-btn:hover { border-color: var(--primary); }
  .method-btn.selected { border-color: var(--primary); background: var(--primary-soft); color: var(--primary); }

  .shift-card { padding: 18px; }
  .shift-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .shift-row:last-child { border-bottom: none; }
  .shift-row .v { font-weight: 700; font-variant-numeric: tabular-nums; }

  .recent-list { display: flex; flex-direction: column; max-height: 380px; overflow-y: auto; }
  .recent-item { padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .recent-item:last-child { border-bottom: none; }
  .recent-item .head { display: flex; justify-content: space-between; }
  .recent-item .head .name { font-weight: 700; font-size: 13px; }
  .recent-item .head .amt { font-weight: 800; color: var(--success); }
  .recent-item .meta { color: var(--text-3); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Касса · Приём платежей</h1>
    <div class="desc" id="kk-desc">Принимайте оплаты по заявкам</div>
  </div>
  <div class="page-head-actions">
    <select class="select" id="kk-cash" style="padding: 8px 30px 8px 12px;"></select>
  </div>
</div>

<div class="kk-grid">

  <!-- LEFT: search -->
  <div style="display: flex; flex-direction: column; gap: 16px;">
    <div class="card search-card">
      <div class="lbl">Найти заявку</div>
      <input class="input" id="kk-search" placeholder="Номер заявки, ФИО или телефон" autocomplete="off" />
      <div id="kk-search-results" style="margin-top: 12px; display: flex; flex-direction: column; gap: 6px; max-height: 360px; overflow-y: auto;"></div>
    </div>

    <div class="card shift-card">
      <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 12px;">Смена</h3>
      <div class="shift-row"><span>Принято сегодня</span><span class="v" id="shift-income">0 ₽</span></div>
      <div class="shift-row"><span>Платежей</span><span class="v" id="shift-count">0</span></div>
      <div class="shift-row"><span>Остаток на кассе</span><span class="v" id="shift-balance">0 ₽</span></div>
    </div>
  </div>

  <!-- CENTER: payment -->
  <div class="card pay-card" id="pay-area">
    <div class="pay-empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin:0 auto 14px;opacity:.4;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <div style="font-size:14px;">Найдите заявку слева</div>
      <div style="font-size:12px;margin-top:6px;">Введите номер, ФИО или телефон клиента</div>
    </div>
  </div>

  <!-- RIGHT: recent payments -->
  <div class="card">
    <div class="card-hd"><h3>Последние платежи</h3></div>
    <div class="recent-list" id="recent-list">
      <div style="padding:30px;text-align:center;color:var(--text-3);font-size:13px;">Платежей в смене ещё не было</div>
    </div>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'kassir', title: 'Касса', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }
  function getInitials(n) { const p = (n || '').trim().split(/\s+/); return ((p[0]?.[0] || '') + (p[1]?.[0] || '')).toUpperCase() || '?'; }

  let allApps = [];
  let allCashes = [];
  let activeCashId = '';
  let selectedApp = null;
  let selectedMethod = 'cash';

  let pendingPayments = [];

  async function load() {
    const [apps, cashes] = await Promise.all([
      PaydDB.list('applications').catch(() => []),
      PaydDB.list('cashes').catch(() => [])
    ]);
    allApps = apps.filter(a => !a.rejected);
    allCashes = cashes.filter(c => c.status !== 'archived');

    // Подтянуть очередь pending платежей
    const sb = window.PaydDB?.cloud?.sb?.();
    if (sb) {
      const today = new Date().toISOString().slice(0, 10);
      const { data } = await sb.from('payments').select('*').eq('status', 'pending').lte('due_date', today).order('due_date');
      pendingPayments = data || [];
    } else {
      pendingPayments = [];
    }

    const sel = document.getElementById('kk-cash');
    if (allCashes.length === 0) {
      sel.innerHTML = '<option value="">— нет касс —</option>';
    } else {
      sel.innerHTML = allCashes.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join('');
      activeCashId = allCashes[0].id;
      sel.value = activeCashId;
    }
    sel.addEventListener('change', () => { activeCashId = sel.value; refreshShift(); });

    refreshSearch();
    refreshShift();
  }

  // ===== Search / Queue =====
  function refreshSearch() {
    const q = (document.getElementById('kk-search').value || '').toLowerCase().trim();
    const list = document.getElementById('kk-search-results');

    let items;
    if (q) {
      items = allApps.filter(a => {
        const blob = ((a.client_name || a.client?.name || '') + ' ' + (a.client_phone || a.client?.phone || '') + ' ' + (a.number || '')).toLowerCase();
        return blob.includes(q);
      }).map(a => ({ app: a, payment: null }));
    } else {
      // По умолчанию — очередь pending платежей
      items = pendingPayments.map(p => {
        const app = allApps.find(a => a.id === p.app_id);
        return app ? { app, payment: p } : null;
      }).filter(Boolean).slice(0, 20);
    }

    if (!items.length) {
      list.innerHTML = `<div style="padding:14px;text-align:center;color:var(--text-3);font-size:12px;">${q ? 'Ничего не нашли' : 'Очередь пуста — все платежи приняты'}</div>`;
      return;
    }

    list.innerHTML = items.map(({ app: a, payment: p }) => {
      const colors = ['c1','c2','c3','c4','c5','c6'];
      const cls = colors[Math.abs((a.client_name || '').length) % colors.length];
      const name = a.client_name || a.client?.name || '—';
      const isFirst = p && p.num === 0;
      const tag = p ? (isFirst ? '<span class="badge primary" style="font-size:10px;">Первый взнос</span>' : `<span class="badge success" style="font-size:10px;">Платёж #${p.num}</span>`) : '';
      const amt = p ? p.amount : (a.amount || a.calc?.price || 0);
      return `
        <div class="search-row" data-app="${escapeHtml(a.id)}" ${p ? `data-pay="${escapeHtml(p.id)}"` : ''} style="display:flex;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;align-items:center;">
          <div class="avatar ${cls} sm">${getInitials(name)}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:600;">${escapeHtml(name)} ${tag}</div>
            <div style="font-size:11px;color:var(--text-3);">#${escapeHtml(a.number || '')} · ${escapeHtml(a.product || '')}</div>
          </div>
          <div style="font-weight:700;font-variant-numeric:tabular-nums;">${fmt(amt)}</div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.search-row').forEach(r => {
      r.addEventListener('click', () => selectApp(r.dataset.app, r.dataset.pay));
    });
  }
  document.getElementById('kk-search').addEventListener('input', refreshSearch);

  // ===== Select app =====
  let selectedPayment = null;
  async function selectApp(appId, paymentId) {
    const app = allApps.find(a => a.id === appId);
    if (!app) return;
    selectedApp = app;
    selectedPayment = paymentId ? pendingPayments.find(p => p.id === paymentId) : null;
    selectedMethod = 'cash';
    renderPay();
  }

  function renderPay() {
    const a = selectedApp;
    const p = selectedPayment;
    const sale = +(a.amount || a.calc?.price) || 0;
    const down = +(a.down_payment || a.calc?.dpAmount) || 0;
    const term = a.term || a.calc?.term || 0;
    const monthly = +(a.monthly || a.calc?.monthly) || 0;
    const phone = a.client_phone || a.client?.phone || '';

    const payAmount = p ? p.amount : (monthly || down || 0);
    const payLabel = p ? (p.num === 0 ? 'Первоначальный взнос' : `Платёж ${p.num} из ${term}`) : 'Платёж';

    document.getElementById('pay-area').innerHTML = `
      <div class="pay-app-head">
        <div>
          <div class="num">Заявка #${escapeHtml(a.number || '')} · ${escapeHtml(payLabel)}</div>
          <div class="client">${escapeHtml(a.client_name || a.client?.name || '—')}</div>
          <div class="product">${escapeHtml(a.product || '')} · ${escapeHtml(phone)}</div>
        </div>
        <a href="zayavka.html?id=${encodeURIComponent(a.id)}" class="btn sm">Открыть карточку →</a>
      </div>

      <div class="pay-row"><span class="l">Цена товара</span><span class="v">${fmt(sale)}</span></div>
      <div class="pay-row"><span class="l">Первый взнос</span><span class="v">${fmt(down)}</span></div>
      <div class="pay-row"><span class="l">Срок рассрочки</span><span class="v">${term} мес</span></div>
      <div class="pay-row"><span class="l">Платёж в месяц</span><span class="v">${fmt(monthly)}</span></div>

      <div style="margin-top: 18px;">
        <label class="field-label">Сумма к приёму</label>
        <input class="input amount-input" id="pay-amount" type="number" value="${payAmount}" />
      </div>

      <div style="margin-top: 14px;">
        <label class="field-label">Способ оплаты</label>
        <div class="method-grid">
          <div class="method-btn selected" data-method="cash">💵 Наличные</div>
          <div class="method-btn" data-method="card">💳 Карта</div>
          <div class="method-btn" data-method="sbp">📱 СБП</div>
        </div>
      </div>

      <div style="display: flex; gap: 8px; margin-top: 20px;">
        <button class="btn primary" id="pay-confirm" data-no-handler="true" style="flex: 1; padding: 14px; font-size: 15px; font-weight: 700;">
          ✓ Принять ${payLabel.toLowerCase()}
        </button>
      </div>
    `;
    document.querySelectorAll('.method-btn').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.method-btn').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
      selectedMethod = b.dataset.method;
    }));
    document.getElementById('pay-confirm').addEventListener('click', acceptPayment);
  }

  // ===== Accept payment =====
  async function acceptPayment() {
    const amount = +document.getElementById('pay-amount').value || 0;
    if (!amount) { PaydApp.toast('Введите сумму', 'error'); return; }
    if (!activeCashId) { PaydApp.toast('Выберите кассу', 'error'); return; }
    if (!window.PaydDB?.cloud?.isOnline?.()) { PaydApp.toast('Войдите в облако', 'error'); return; }

    const sb = PaydDB.cloud.sb();
    const a = selectedApp;
    const p = selectedPayment;
    const num = 'PD-' + String(Date.now()).slice(-6);
    const isFirst = p && p.num === 0;
    const articleId = isFirst ? 'a_first_pay' : 'a_installment';
    const articleName = isFirst ? 'Первоначальный взнос' : 'Платёж по графику';

    try {
      // 1. Если есть конкретный payment в графике — пометить его paid
      if (p) {
        await sb.from('payments').update({
          status: 'paid', paid_at: new Date().toISOString(),
          cash_id: activeCashId, method: selectedMethod, amount
        }).eq('id', p.id);
      } else {
        // Платёж вне графика — создаём новую запись
        await sb.from('payments').insert({
          app_id: a.id, amount, method: selectedMethod, cash_id: activeCashId,
          status: 'paid', paid_at: new Date().toISOString(), kind: 'installment'
        });
      }

      // 2. cash_op (приход)
      await sb.from('cash_ops').insert({
        num, dir: 'in', cash_id: activeCashId, amount,
        article_id: articleId, article_name: articleName,
        party: a.client_name || a.client?.name,
        app_id: a.id, note: 'Заявка #' + (a.number || '')
      });

      // 3. cash balance
      const cash = allCashes.find(c => c.id === activeCashId);
      if (cash) {
        const newBalance = (+cash.balance || 0) + amount;
        await sb.from('cashes').update({ balance: newBalance }).eq('id', activeCashId);
        cash.balance = newBalance;
      }

      // 4. audit log
      const auditAction = isFirst ? 'payment.first_paid' : 'payment.accepted';
      await PaydDB.audit.log(a.id, auditAction, { amount, method: selectedMethod, payment_num: p?.num });

      PaydApp.toast(`${isFirst ? 'Первый взнос' : 'Платёж'} ${fmt(amount)} принят`, { type: 'success', subtitle: 'Чек #' + num });
      selectedApp = null;
      selectedPayment = null;
      document.getElementById('kk-search').value = '';
      document.getElementById('pay-area').innerHTML = `<div class="pay-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" style="margin:0 auto 14px;"><polyline points="20 6 9 17 4 12"/></svg>
        <div style="font-size:14px;">Платёж принят</div>
        <div style="font-size:12px;margin-top:6px;">Очередь обновлена</div>
      </div>`;
      load();
    } catch (err) {
      PaydApp.toast('Ошибка: ' + err.message, 'error');
    }
  }

  // ===== Shift state =====
  async function refreshShift() {
    if (!activeCashId) return;
    const sb = PaydDB.cloud.sb();
    if (!sb) return;

    const today = new Date(); today.setHours(0,0,0,0);
    const todayISO = today.toISOString();

    const { data: ops } = await sb.from('cash_ops')
      .select('*')
      .eq('cash_id', activeCashId)
      .eq('dir', 'in')
      .gte('date', todayISO)
      .order('date', { ascending: false });

    const list = ops || [];
    const total = list.reduce((s, o) => s + (+o.amount || 0), 0);
    document.getElementById('shift-income').textContent = fmt(total);
    document.getElementById('shift-count').textContent = list.length;

    const cash = allCashes.find(c => c.id === activeCashId);
    document.getElementById('shift-balance').textContent = fmt(cash?.balance || 0);

    // Recent list
    const recent = document.getElementById('recent-list');
    if (!list.length) {
      recent.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-3);font-size:13px;">Платежей в смене ещё не было</div>';
    } else {
      recent.innerHTML = list.slice(0, 20).map(o => `
        <div class="recent-item">
          <div class="head">
            <span class="name">${escapeHtml(o.party || '—')}</span>
            <span class="amt">+${fmt(o.amount)}</span>
          </div>
          <div class="meta">${escapeHtml(o.num || '')} · ${new Date(o.date).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })}</div>
        </div>
      `).join('');
    }
  }

  load();
  setInterval(refreshShift, 10000);
  if (window.PaydDB?.subscribe) {
    PaydDB.subscribe('cash_ops', refreshShift);
    PaydDB.subscribe('applications', () => { load().then(refreshSearch); });
  }
</script>
</body>
</html>
