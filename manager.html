<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Менеджер · CRM — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .kb-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; min-height: 70vh; }
  @media (max-width: 1300px) { .kb-board { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 800px)  { .kb-board { grid-template-columns: 1fr; } }

  .kb-col { background: var(--surface-2); border-radius: var(--radius); padding: 10px; display: flex; flex-direction: column; min-height: 200px; }
  .kb-col-head { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px 10px; }
  .kb-col-head .t { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
  .kb-col-head .n { font-size: 11px; color: var(--text-3); font-weight: 700; padding: 2px 8px; background: white; border-radius: 999px; }

  .kb-col.new      .kb-col-head .t { color: var(--primary); }
  .kb-col.sb       .kb-col-head .t { color: var(--warning); }
  .kb-col.contract .kb-col-head .t { color: var(--purple); }
  .kb-col.active   .kb-col-head .t { color: var(--success); }
  .kb-col.closed   .kb-col-head .t { color: var(--text-3); }

  .kb-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all .12s; }
  .kb-card:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
  .kb-card .num { font-size: 11px; color: var(--text-3); font-family: 'Courier New', monospace; }
  .kb-card .name { font-size: 13px; font-weight: 700; margin-top: 2px; }
  .kb-card .product { font-size: 11px; color: var(--text-2); margin-top: 4px; min-height: 28px; }
  .kb-card .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 11px; }
  .kb-card .amt { font-weight: 700; }
  .kb-card .when { color: var(--text-3); }

  .empty-col { padding: 30px 12px; text-align: center; color: var(--text-3); font-size: 11px; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Менеджер · CRM</h1>
    <div class="desc" id="mg-desc">Все мои сделки</div>
  </div>
  <div class="page-head-actions">
    <a href="zayavka-new.html" class="btn primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Новая заявка
    </a>
  </div>
</div>

<div class="stat-grid cols-5 mb-4">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-total">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--primary);">Новые</div>
    <div class="stat-value" style="font-size: 22px; color: var(--primary);" id="kpi-new">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--warning);">На СБ</div>
    <div class="stat-value" style="font-size: 22px; color: var(--warning);" id="kpi-sb">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--success);">Активные</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-active">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Сумма портфеля</div>
    <div class="stat-value" style="font-size: 18px;" id="kpi-amount">0 ₽</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-search">
    <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="mg-search" placeholder="Поиск по клиенту, номеру, товару..." />
  </div>
</div>

<div class="kb-board" id="kb-board"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'manager', title: 'CRM Менеджера', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  const fmtRel = ts => { const d = (Date.now() - new Date(ts).getTime()) / 1000; if (d < 60) return 'только что'; if (d < 3600) return Math.round(d/60) + ' мин'; if (d < 86400) return Math.round(d/3600) + ' ч'; return Math.round(d/86400) + ' дн'; };
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  const COLUMNS = [
    { id: 'new',      title: 'Новые',          cls: 'new' },
    { id: 'sb',       title: 'На проверке СБ', cls: 'sb' },
    { id: 'contract', title: 'Договор',        cls: 'contract' },
    { id: 'active',   title: 'Активные',       cls: 'active' },
    { id: 'closed',   title: 'Закрыто/отказ',  cls: 'closed' }
  ];

  let allApps = [];
  let workflows = {};

  async function load() {
    const [apps, wfs] = await Promise.all([
      PaydDB.list('applications').catch(() => []),
      PaydDB.list('workflows').catch(() => [])
    ]);
    allApps = apps;
    workflows = {};
    (Array.isArray(wfs) ? wfs : Object.values(wfs)).forEach(w => { if (w.app_id) workflows[w.app_id] = w; });
    render();
  }

  // Колонки определяются по типу заявки через PaydDB.workflows.flowFor —
  // никаких магических чисел step >= 3/4. contractStep/downpayStep
  // приходят из WORKFLOW_FLOWS в db.js (одна правда на проект).
  const _defaultFlow = { contractStep: 3, downpayStep: 4, deliverStep: 5 };
  function flowOf(a, wf) {
    if (window.PaydDB?.workflows?.flowFor) {
      return PaydDB.workflows.flowFor(a?.type || wf?.type);
    }
    return _defaultFlow;
  }

  function classifyApp(a) {
    if (a.rejected || a.closed) return 'closed';
    const wf = workflows[a.id];
    if (!wf)            return 'new';
    if (wf.rejected)    return 'closed';
    if (wf.completed)   return 'closed';
    if (!wf.sb_passed)  return 'sb';
    // sb_passed === true: классифицируем по step относительно гейтов flow
    const flow = flowOf(a, wf);
    const step = Number(wf.step) || 1;
    if (step >= flow.downpayStep)  return 'active';
    if (step >= flow.contractStep) return 'contract';
    // sb_passed=true, но step < contractStep — аномалия legacy данных;
    // безопаснее вернуть 'contract' (СБ уже пройдена, договор — следующий гейт).
    return 'contract';
  }

  function render() {
    const q = (document.getElementById('mg-search').value || '').toLowerCase().trim();
    const filtered = q
      ? allApps.filter(a => {
          const blob = ((a.client_name || a.client?.name || '') + ' ' + (a.number || '') + ' ' + (a.product || '')).toLowerCase();
          return blob.includes(q);
        })
      : allApps;

    const byCol = {};
    COLUMNS.forEach(c => byCol[c.id] = []);
    filtered.forEach(a => {
      const col = classifyApp(a);
      byCol[col].push(a);
    });

    const board = document.getElementById('kb-board');
    board.innerHTML = COLUMNS.map(col => `
      <div class="kb-col ${col.cls}">
        <div class="kb-col-head">
          <span class="t">${col.title}</span>
          <span class="n">${byCol[col.id].length}</span>
        </div>
        <div>
          ${byCol[col.id].length === 0
            ? `<div class="empty-col">пусто</div>`
            : byCol[col.id].slice(0, 30).map(a => renderCard(a)).join('')}
        </div>
      </div>
    `).join('');

    board.querySelectorAll('.kb-card').forEach(c => {
      c.addEventListener('click', () => location.href = 'zayavka.html?id=' + encodeURIComponent(c.dataset.id));
    });

    document.getElementById('kpi-total').textContent = filtered.length;
    document.getElementById('kpi-new').textContent = byCol.new.length;
    document.getElementById('kpi-sb').textContent = byCol.sb.length;
    document.getElementById('kpi-active').textContent = byCol.active.length + byCol.contract.length;
    const portfolio = filtered
      .filter(a => !a.closed && !a.rejected)
      .reduce((s, a) => s + (+(a.amount || a.calc?.price) || 0), 0);
    document.getElementById('kpi-amount').textContent = fmt(portfolio);
    document.getElementById('mg-desc').textContent = 'Сделок: ' + filtered.length + ' · в работе ' + (byCol.new.length + byCol.sb.length + byCol.contract.length + byCol.active.length);
  }

  function renderCard(a) {
    return `
      <div class="kb-card" data-id="${escapeHtml(a.id)}">
        <div class="num">#${escapeHtml(a.number || '')}</div>
        <div class="name">${escapeHtml(a.client_name || a.client?.name || '—')}</div>
        <div class="product">${escapeHtml(a.product || '—')}</div>
        <div class="foot">
          <span class="amt">${fmt(a.amount || a.calc?.price || 0)}</span>
          <span class="when">${fmtRel(a.ts || a.created_at)}</span>
        </div>
      </div>
    `;
  }

  document.getElementById('mg-search').addEventListener('input', render);

  load();
  if (window.PaydDB?.subscribe) {
    PaydDB.subscribe('applications', load);
    PaydDB.subscribe('workflows', load);
  }
</script>
</body>
</html>
