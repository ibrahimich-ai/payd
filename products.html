<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Товары — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .layout { display: grid; grid-template-columns: 240px 1fr; gap: 16px; }
  @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }

  .cat-list { display: flex; flex-direction: column; }
  .cat-item { padding: 10px 14px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; color: var(--text-2); margin: 1px 8px; transition: all .12s; }
  .cat-item:hover { background: var(--surface-2); color: var(--text); }
  .cat-item.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .cat-item .icn { width: 24px; height: 24px; border-radius: 6px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .cat-item.active .icn { background: var(--primary); color: white; }
  .cat-item .count { margin-left: auto; font-size: 11px; color: var(--text-3); font-weight: 600; }

  .cat-head { display: flex; align-items: center; padding: 8px 20px; }
  .cat-head .ttl { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); font-weight: 700; flex: 1; }
  .cat-kebab { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-3); }
  .cat-kebab:hover { background: var(--surface-2); color: var(--text); }

  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .pcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all .15s;
  }
  .pcard:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .pcard-img {
    height: 160px;
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    position: relative;
  }
  .pcard-badge { position: absolute; top: 10px; left: 10px; }
  .pcard-fav { position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); cursor: pointer; }
  .pcard-body { padding: 14px; }
  .pcard-name { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
  .pcard-code { font-size: 11px; color: var(--text-3); }
  .pcard-prices { display: flex; align-items: baseline; gap: 6px; margin-top: 10px; }
  .pcard-price { font-size: 16px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
  .pcard-old { font-size: 12px; color: var(--text-3); text-decoration: line-through; font-variant-numeric: tabular-nums; }
  .pcard-stats { display: flex; justify-content: space-between; padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-3); }
  .pcard-stats b { color: var(--text); font-weight: 700; }

  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); grid-column: 1 / -1; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, .55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 540px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  .cat-manage-row { display: flex; align-items: center; gap: 6px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .cat-manage-row:last-child { border-bottom: none; }
  .cat-manage-row input { flex: 1; }
  .cat-manage-row .btn.sm { padding: 6px 8px; font-size: 11px; }

  .cat-item .chev { width: 14px; flex-shrink: 0; cursor: pointer; color: var(--text-3); display: flex; align-items: center; justify-content: center; }
  .cat-item .chev svg { transition: transform .15s; }
  .cat-item.expanded .chev svg { transform: rotate(90deg); }
  .cat-item.has-children .chev { color: var(--text-2); }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Товары</h1>
    <div class="desc" id="pp-desc">Каталог товаров</div>
  </div>
  <div class="page-head-actions">
    <button class="btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Импорт
    </button>
    <button class="btn primary" id="btn-new-product" data-no-handler="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Новый товар
    </button>
  </div>
</div>

<div class="stat-grid cols-4 mb-5">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего товаров</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-total">0</div>
    <div class="stat-sub">в каталоге</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">В наличии</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-instock">0</div>
    <div class="stat-sub">статус «в наличии»</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">В рассрочке</div>
    <div class="stat-value" style="font-size: 22px; color: var(--primary);" id="kpi-active">0</div>
    <div class="stat-sub">активные продажи</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Категорий</div>
    <div class="stat-value" style="font-size: 22px; color: var(--purple);" id="kpi-cats">0</div>
    <div class="stat-sub">в системе</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-search">
    <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="pp-search" placeholder="Поиск по названию, артикулу, штрих-коду..." />
  </div>
  <div class="filter-extras">
    <select><option>Все бренды</option></select>
    <select><option>Цена: любая</option></select>
    <select><option>Сортировка: популярность</option></select>
  </div>
</div>

<div class="layout">
  <div class="card" style="padding: 12px 0; align-self: flex-start;">
    <div class="cat-head">
      <div class="ttl">Категории</div>
      <div class="cat-kebab" id="cat-manage-btn" data-no-handler="true" title="Настроить категории">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </div>
    </div>
    <div class="cat-list" id="cat-list"></div>
  </div>

  <div class="product-grid" id="product-grid">
    <div class="empty">Загрузка...</div>
  </div>
</div>

</div>

<!-- ============ NEW/EDIT PRODUCT MODAL ============ -->
<div class="modal-bg" id="prod-modal">
  <div class="modal">
    <h3 id="prod-modal-title">Новый товар</h3>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Название *</label>
        <input class="input" id="m-name" placeholder="Например: iPhone 16 Pro 256GB" />
      </div>
      <div class="field">
        <label class="field-label">Цвет / характеристика</label>
        <input class="input" id="m-color" placeholder="Натуральный титан" />
      </div>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Артикул / код</label>
        <input class="input" id="m-code" placeholder="000001234" />
      </div>
      <div class="field">
        <label class="field-label">Категория</label>
        <select class="select" id="m-cat"></select>
      </div>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Цена закупки (₽)</label>
        <input class="input" id="m-purchase" type="number" placeholder="0" />
      </div>
      <div class="field">
        <label class="field-label">Цена продажи (₽) *</label>
        <input class="input" id="m-price" type="number" placeholder="0" />
      </div>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Количество (шт)</label>
        <input class="input" id="m-stock" type="number" placeholder="0" value="0" />
      </div>
      <div class="field">
        <label class="field-label">Статус</label>
        <select class="select" id="m-status">
          <option value="instock">В наличии</option>
          <option value="order">Под заказ</option>
          <option value="archived">Снят с продажи</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="m-delete" data-no-handler="true" style="display:none;">Удалить</button>
      <button class="btn" id="m-cancel" data-no-handler="true" style="margin-left:auto;">Отмена</button>
      <button class="btn primary" id="m-save" data-no-handler="true">Сохранить</button>
    </div>
  </div>
</div>

<!-- ============ CATEGORIES MANAGE MODAL ============ -->
<div class="modal-bg" id="cat-modal">
  <div class="modal">
    <h3>Категории товаров</h3>
    <div style="font-size: 12px; color: var(--text-3); margin-bottom: 12px;">Добавьте, переименуйте или удалите категории</div>
    <div id="cat-manage-list"></div>
    <div class="cat-manage-row" style="border-top: 1px solid var(--border); border-bottom: none; padding-top: 14px;">
      <input class="input" id="cat-new-name" placeholder="Название новой категории" />
      <button class="btn primary" id="cat-add" data-no-handler="true">+ Добавить</button>
    </div>
    <div class="modal-actions">
      <button class="btn primary" id="cat-close" data-no-handler="true">Готово</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({
    active: 'products',
    title: 'Товары',
    breadcrumbs: []
  });

  const PRODUCTS_KEY = 'payd.products.v1';
  const CATEGORIES_KEY = 'payd.products.categories.v1';

  // Иконки категорий (как в старом дизайне)
  const CAT_ICONS = {
    'Смартфоны':       '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
    'Ноутбуки':        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="13" rx="1.5"/><line x1="2" y1="20" x2="22" y2="20"/></svg>',
    'Телевизоры':      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="17 21 12 17 7 21"/></svg>',
    'Аудио':           '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>',
    'Часы':            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="6"/><polyline points="12 10 12 12 13 13"/></svg>',
    'Игровые':         '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"/></svg>',
    'Фототехника':     '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
    'Бытовая техника': '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    'Мебель':          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 9V6a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v3"/><path d="M3 11v5a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v2H7v-2a2 2 0 0 0-4 0z"/></svg>',
    'Транспорт':       '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>'
  };
  const DEFAULT_CAT_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
  const PROD_ICON_DEFAULT = '<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#1a2332" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>';

  function loadProducts() {
    try { return JSON.parse(localStorage.getItem(PRODUCTS_KEY) || '{}'); }
    catch (_) { return {}; }
  }
  function saveProducts(map) {
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(map));
  }
  // Categories: array of { id, name, parent }
  function loadCats() {
    try {
      const raw = JSON.parse(localStorage.getItem(CATEGORIES_KEY) || 'null');
      if (!raw) {
        // First-time defaults
        return [
          { id: 'cat_phones',  name: 'Смартфоны',       parent: null },
          { id: 'cat_laptops', name: 'Ноутбуки',         parent: null },
          { id: 'cat_tv',      name: 'Телевизоры',       parent: null },
          { id: 'cat_audio',   name: 'Аудио',            parent: null },
          { id: 'cat_watch',   name: 'Часы',             parent: null },
          { id: 'cat_appl',    name: 'Бытовая техника',  parent: null }
        ];
      }
      // Migrate from old flat string array
      if (raw.length && typeof raw[0] === 'string') {
        return raw.map(name => ({ id: 'cat_' + Math.random().toString(36).slice(2, 8), name, parent: null }));
      }
      return raw;
    } catch (_) { return []; }
  }
  function saveCats(arr) {
    localStorage.setItem(CATEGORIES_KEY, JSON.stringify(arr));
  }
  function newCatId() { return 'cat_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6); }
  function getCatById(cats, id) { return cats.find(c => c.id === id); }
  function getCatByName(cats, name) { return cats.find(c => c.name === name && c.parent == null); }
  function getDescendants(cats, parentId) {
    const out = [];
    const stack = [parentId];
    while (stack.length) {
      const id = stack.pop();
      cats.filter(c => c.parent === id).forEach(c => { out.push(c); stack.push(c.id); });
    }
    return out;
  }
  function getDepth(cats, id) {
    let depth = 0; let cur = getCatById(cats, id);
    while (cur?.parent) { depth++; cur = getCatById(cats, cur.parent); }
    return depth;
  }
  function getCatPath(cats, id) {
    const parts = []; let cur = getCatById(cats, id);
    while (cur) { parts.unshift(cur.name); cur = cur.parent ? getCatById(cats, cur.parent) : null; }
    return parts.join(' / ');
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }
  const fmt = (v) => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';

  let activeCat = '__all__';
  const expandedCats = new Set(); // ids of expanded categories

  function getProductIcon(p) {
    const cats = loadCats();
    // Walk up to find a known top-level icon
    let cur = getCatById(cats, p.category);
    while (cur) {
      if (CAT_ICONS[cur.name]) {
        return CAT_ICONS[cur.name].replace(/width="16" height="16"/, 'width="64" height="64"').replace(/stroke-width="2"/, 'stroke-width="1.4"').replace(/stroke="currentColor"/, 'stroke="#1a2332"');
      }
      cur = cur.parent ? getCatById(cats, cur.parent) : null;
    }
    return PROD_ICON_DEFAULT;
  }
  function getCatIcon(cat) {
    if (CAT_ICONS[cat.name]) return CAT_ICONS[cat.name];
    return DEFAULT_CAT_ICON;
  }

  function refresh() {
    const products = Object.values(loadProducts());
    const cats = loadCats();

    // Compute counts per category (own + descendants)
    const directCount = {};
    products.forEach(p => { if (p.category) directCount[p.category] = (directCount[p.category] || 0) + 1; });
    function totalCount(catId) {
      let n = directCount[catId] || 0;
      cats.filter(c => c.parent === catId).forEach(child => { n += totalCount(child.id); });
      return n;
    }

    // Render categories tree
    const catList = document.getElementById('cat-list');
    const items = [
      `<div class="cat-item ${activeCat === '__all__' ? 'active' : ''}" data-cat="__all__" style="padding-left:14px;">
        <span class="icn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span>Все товары</span><span class="count">${products.length}</span>
      </div>`
    ];
    function renderNode(c, depth) {
      const hasChildren = cats.some(x => x.parent === c.id);
      const expanded = expandedCats.has(c.id);
      const padLeft = 14 + depth * 16;
      const chevSvg = hasChildren
        ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'
        : '';
      items.push(`
        <div class="cat-item ${activeCat === c.id ? 'active' : ''} ${hasChildren ? 'has-children' : ''} ${expanded ? 'expanded' : ''}"
             data-cat="${escapeHtml(c.id)}" style="padding-left:${padLeft}px;">
          <span class="chev" data-toggle="${escapeHtml(c.id)}">${chevSvg}</span>
          <span class="icn">${getCatIcon(c)}</span>
          <span>${escapeHtml(c.name)}</span>
          <span class="count">${totalCount(c.id)}</span>
        </div>
      `);
      if (expanded) {
        cats.filter(x => x.parent === c.id).forEach(child => renderNode(child, depth + 1));
      }
    }
    cats.filter(c => !c.parent).forEach(c => renderNode(c, 0));
    catList.innerHTML = items.join('');

    catList.querySelectorAll('.chev[data-toggle]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const id = el.dataset.toggle;
        if (expandedCats.has(id)) expandedCats.delete(id);
        else expandedCats.add(id);
        refresh();
      });
    });
    catList.querySelectorAll('.cat-item').forEach(el => {
      el.addEventListener('click', () => { activeCat = el.dataset.cat; refresh(); });
    });

    // Filter products: include descendants
    const q = (document.getElementById('pp-search').value || '').toLowerCase().trim();
    let filtered = products;
    if (activeCat !== '__all__') {
      const allowed = new Set([activeCat, ...getDescendants(cats, activeCat).map(c => c.id)]);
      filtered = filtered.filter(p => allowed.has(p.category));
    }
    if (q) filtered = filtered.filter(p => (p.name || '').toLowerCase().includes(q) || (p.code || '').toLowerCase().includes(q));

    const grid = document.getElementById('product-grid');
    if (!filtered.length) {
      grid.innerHTML = `
        <div class="empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.4;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          <div>${q || activeCat !== '__all__' ? 'Ничего не нашли' : 'Товаров пока нет'}</div>
          <div style="font-size:12px;margin-top:6px;">${q || activeCat !== '__all__' ? '' : 'Нажми «Новый товар» чтобы добавить'}</div>
        </div>
      `;
    } else {
      grid.innerHTML = filtered.map(p => {
        const badge = p.status === 'order' ? '<span class="badge purple pcard-badge">Под заказ</span>'
                    : p.status === 'archived' ? '<span class="badge gray pcard-badge">Архив</span>'
                    : '';
        const stockText = p.status === 'order' ? 'под заказ' : p.status === 'archived' ? 'снят с продажи' : (p.stock || 0) + ' шт';
        return `
          <div class="pcard" data-id="${escapeHtml(p.id)}">
            <div class="pcard-img">
              ${getProductIcon(p)}
              ${badge}
            </div>
            <div class="pcard-body">
              <div class="pcard-name">${escapeHtml(p.name)}${p.color ? ' · ' + escapeHtml(p.color) : ''}</div>
              <div class="pcard-code">${escapeHtml(p.code || '—')} · ${escapeHtml(stockText)}</div>
              <div class="pcard-prices">
                <div class="pcard-price">${fmt(p.price)}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      grid.querySelectorAll('.pcard').forEach(card => {
        card.addEventListener('click', () => openEdit(card.dataset.id));
      });
    }

    // KPIs
    document.getElementById('kpi-total').textContent = products.length;
    document.getElementById('kpi-instock').textContent = products.filter(p => p.status !== 'archived').reduce((s, p) => s + (+p.stock || 0), 0);
    document.getElementById('kpi-cats').textContent = cats.length;
    document.getElementById('pp-desc').textContent = 'Каталог · ' + products.length + ' ' + (products.length === 1 ? 'товар' : 'товаров') + ' · ' + cats.length + ' ' + (cats.length === 1 ? 'категория' : 'категорий');

    refreshSold();
  }

  async function refreshSold() {
    if (!window.PaydDB) return;
    const apps = await PaydDB.list('applications').catch(() => []);
    document.getElementById('kpi-active').textContent = apps.filter(a => !a.closed && !a.rejected).length;
  }

  // ============ Product modal ============
  const prodModal = document.getElementById('prod-modal');
  let editingId = null;

  function openNew() {
    editingId = null;
    document.getElementById('prod-modal-title').textContent = 'Новый товар';
    document.getElementById('m-delete').style.display = 'none';
    ['m-name','m-color','m-code','m-purchase','m-price'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-stock').value = '0';
    document.getElementById('m-status').value = 'instock';
    populateCatSelect();
    prodModal.classList.add('open');
    setTimeout(() => document.getElementById('m-name').focus(), 50);
  }
  function openEdit(id) {
    const products = loadProducts();
    const p = products[id];
    if (!p) return;
    editingId = id;
    document.getElementById('prod-modal-title').textContent = 'Товар: ' + p.name;
    document.getElementById('m-delete').style.display = '';
    document.getElementById('m-name').value = p.name || '';
    document.getElementById('m-color').value = p.color || '';
    document.getElementById('m-code').value = p.code || '';
    document.getElementById('m-purchase').value = p.purchase || '';
    document.getElementById('m-price').value = p.price || '';
    document.getElementById('m-stock').value = p.stock || 0;
    document.getElementById('m-status').value = p.status || 'instock';
    populateCatSelect(p.category);
    prodModal.classList.add('open');
  }
  function populateCatSelect(selected) {
    const sel = document.getElementById('m-cat');
    const cats = loadCats();
    const opts = ['<option value="">— без категории —</option>'];
    function addNode(c, depth) {
      const indent = '— '.repeat(depth);
      opts.push(`<option value="${escapeHtml(c.id)}"${selected === c.id ? ' selected' : ''}>${indent}${escapeHtml(c.name)}</option>`);
      cats.filter(x => x.parent === c.id).forEach(ch => addNode(ch, depth + 1));
    }
    cats.filter(c => !c.parent).forEach(c => addNode(c, 0));
    sel.innerHTML = opts.join('');
  }
  function closeProdModal() { prodModal.classList.remove('open'); }

  document.getElementById('btn-new-product').addEventListener('click', openNew);
  document.getElementById('m-cancel').addEventListener('click', closeProdModal);
  prodModal.addEventListener('click', e => { if (e.target === prodModal) closeProdModal(); });

  document.getElementById('m-save').addEventListener('click', () => {
    const name = document.getElementById('m-name').value.trim();
    const price = +document.getElementById('m-price').value || 0;
    if (!name) { PaydApp.toast('Укажите название', 'error'); return; }
    if (!price) { PaydApp.toast('Укажите цену продажи', 'error'); return; }

    const products = loadProducts();
    const id = editingId || ('p_' + Date.now());
    products[id] = {
      id,
      name,
      color: document.getElementById('m-color').value.trim(),
      code: document.getElementById('m-code').value.trim(),
      category: document.getElementById('m-cat').value,
      purchase: +document.getElementById('m-purchase').value || 0,
      price,
      stock: +document.getElementById('m-stock').value || 0,
      status: document.getElementById('m-status').value,
      created_at: products[id]?.created_at || new Date().toISOString()
    };
    saveProducts(products);
    PaydApp.toast(editingId ? 'Товар обновлён' : 'Товар добавлен', 'success');
    closeProdModal();
    refresh();
  });

  document.getElementById('m-delete').addEventListener('click', () => {
    if (!editingId) return;
    PaydApp.confirmDialog({
      title: 'Удалить товар?',
      message: 'Действие нельзя отменить.',
      okText: 'Удалить',
      onOk: () => {
        const products = loadProducts();
        delete products[editingId];
        saveProducts(products);
        PaydApp.toast('Товар удалён', 'success');
        closeProdModal();
        refresh();
      }
    });
  });

  // ============ Categories modal (tree) ============
  const catModal = document.getElementById('cat-modal');
  function renderCatManage() {
    const list = document.getElementById('cat-manage-list');
    const cats = loadCats();
    const rows = [];
    function addRow(c, depth) {
      rows.push(`
        <div class="cat-manage-row" style="padding-left:${depth * 18}px;">
          <input class="input" data-edit="${escapeHtml(c.id)}" value="${escapeHtml(c.name)}" />
          <button class="btn sm" data-add-sub="${escapeHtml(c.id)}" data-no-handler="true" title="Добавить подкатегорию">+ подкат</button>
          <button class="btn danger sm" data-del="${escapeHtml(c.id)}" data-no-handler="true">Удалить</button>
        </div>
      `);
      cats.filter(x => x.parent === c.id).forEach(ch => addRow(ch, depth + 1));
    }
    cats.filter(c => !c.parent).forEach(c => addRow(c, 0));
    list.innerHTML = rows.length ? rows.join('') : '<div style="padding:14px;text-align:center;color:var(--text-3);font-size:13px;">Категорий пока нет</div>';

    list.querySelectorAll('input[data-edit]').forEach(inp => {
      inp.addEventListener('change', () => {
        const id = inp.dataset.edit;
        const newName = inp.value.trim();
        if (!newName) return;
        const cats = loadCats();
        const c = getCatById(cats, id);
        if (c) { c.name = newName; saveCats(cats); refresh(); }
      });
    });
    list.querySelectorAll('[data-add-sub]').forEach(btn => {
      btn.addEventListener('click', () => {
        const parentId = btn.dataset.addSub;
        const name = prompt('Название подкатегории:');
        if (!name?.trim()) return;
        const cats = loadCats();
        cats.push({ id: newCatId(), name: name.trim(), parent: parentId });
        saveCats(cats);
        expandedCats.add(parentId);
        renderCatManage();
        refresh();
      });
    });
    list.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.del;
        const cats = loadCats();
        const c = getCatById(cats, id);
        if (!c) return;
        const descIds = [c.id, ...getDescendants(cats, c.id).map(x => x.id)];
        const productCount = Object.values(loadProducts()).filter(p => descIds.includes(p.category)).length;
        PaydApp.confirmDialog({
          title: 'Удалить категорию «' + c.name + '»?',
          message: descIds.length > 1
            ? `Удалятся все ${descIds.length} вложенные категории. Товары (${productCount}) останутся, но без категории.`
            : `Товары (${productCount}) в этой категории останутся, но без категории.`,
          okText: 'Удалить',
          onOk: () => {
            const updated = cats.filter(x => !descIds.includes(x.id));
            saveCats(updated);
            const products = loadProducts();
            Object.values(products).forEach(p => { if (descIds.includes(p.category)) p.category = ''; });
            saveProducts(products);
            renderCatManage();
            refresh();
          }
        });
      });
    });
  }

  document.getElementById('cat-manage-btn').addEventListener('click', () => {
    renderCatManage();
    catModal.classList.add('open');
  });
  document.getElementById('cat-close').addEventListener('click', () => catModal.classList.remove('open'));
  catModal.addEventListener('click', e => { if (e.target === catModal) catModal.classList.remove('open'); });

  document.getElementById('cat-add').addEventListener('click', () => {
    const inp = document.getElementById('cat-new-name');
    const name = inp.value.trim();
    if (!name) return;
    const cats = loadCats();
    if (cats.some(c => c.name === name && !c.parent)) {
      PaydApp.toast('Такая категория уже есть', 'error');
      return;
    }
    cats.push({ id: newCatId(), name, parent: null });
    saveCats(cats);
    inp.value = '';
    renderCatManage();
    refresh();
  });
  document.getElementById('cat-new-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('cat-add').click();
  });

  // ============ Search ============
  document.getElementById('pp-search').addEventListener('input', refresh);

  refresh();
  window.addEventListener('storage', e => {
    if (e.key === PRODUCTS_KEY || e.key === CATEGORIES_KEY) refresh();
  });
</script>
</body>
</html>
