<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Промо — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .pr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .pr-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all .15s; position: relative; }
  .pr-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .pr-card.inactive { opacity: .55; }
  .pr-name { font-size: 16px; font-weight: 700; }
  .pr-desc { font-size: 12px; color: var(--text-3); margin-top: 4px; min-height: 28px; }
  .pr-code { display: inline-block; padding: 4px 10px; background: var(--surface-2); border-radius: 6px; font-family: 'Courier New', monospace; font-size: 12px; font-weight: 700; margin-top: 8px; }
  .pr-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-top: 12px; margin-top: 12px; border-top: 1px solid var(--border); font-size: 11px; }
  .pr-meta .l { color: var(--text-3); }
  .pr-meta .v { font-weight: 700; margin-top: 2px; font-size: 13px; }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); grid-column: 1/-1; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 540px; width: 100%; padding: 24px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Промо-акции</h1>
    <div class="desc" id="pr-desc">Скидки, кешбэк, спец-условия</div>
  </div>
  <div class="page-head-actions">
    <button class="btn primary" id="btn-new-pr" data-no-handler="true">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Новая акция
    </button>
  </div>
</div>

<div class="stat-grid cols-3 mb-5">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Всего акций</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-total">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Активные</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-active">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Завершённые</div>
    <div class="stat-value" style="font-size: 22px; color: var(--text-3);" id="kpi-expired">0</div>
  </div>
</div>

<div class="pr-grid" id="pr-grid">
  <div class="empty">Загрузка...</div>
</div>

</div>

<div class="modal-bg" id="pr-modal">
  <div class="modal">
    <h3 id="pr-modal-title">Новая акция</h3>
    <div class="field" style="margin-bottom: 12px;">
      <label class="field-label">Название *</label>
      <input class="input" id="m-name" placeholder="Скидка 10% на iPhone 16" />
    </div>
    <div class="field" style="margin-bottom: 12px;">
      <label class="field-label">Описание</label>
      <textarea class="textarea" id="m-desc" placeholder="Описание акции для клиентов"></textarea>
    </div>
    <div class="modal-row">
      <div class="field">
        <label class="field-label">Код</label>
        <input class="input" id="m-code" placeholder="SUMMER10" />
      </div>
      <div class="field">
        <label class="field-label">Тип</label>
        <select class="select" id="m-type">
          <option value="discount">Скидка</option>
          <option value="cashback">Кешбэк</option>
          <option value="term_extension">Доп. срок</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="field"><label class="field-label">Значение</label><input class="input" id="m-value" type="number" placeholder="10" /></div>
      <div class="field"><label class="field-label">Партнёр (опц.)</label><select class="select" id="m-partner"><option value="">— любой —</option></select></div>
    </div>
    <div class="modal-row">
      <div class="field"><label class="field-label">Начало</label><input class="input" id="m-start" type="date" /></div>
      <div class="field"><label class="field-label">Окончание</label><input class="input" id="m-end" type="date" /></div>
    </div>
    <div class="field" style="margin-bottom: 12px;">
      <label style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
        <input type="checkbox" id="m-active" checked /> Акция активна
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn danger" id="m-delete" data-no-handler="true" style="display:none;">Удалить</button>
      <button class="btn" id="m-cancel" data-no-handler="true" style="margin-left:auto;">Отмена</button>
      <button class="btn primary" id="m-save" data-no-handler="true">Сохранить</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'promo', title: 'Промо', breadcrumbs: [] });

  const TYPE_LABELS = { discount: 'Скидка', cashback: 'Кешбэк', term_extension: 'Доп. срок' };
  const TYPE_UNITS  = { discount: '%', cashback: '%', term_extension: 'мес' };
  const fmtDate = iso => { if (!iso) return '—'; const d = new Date(iso); if (isNaN(d.getTime())) return '—'; const p = n => String(n).padStart(2, '0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`; };
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  let editingId = null;
  let allPromo = [];
  let allPartners = [];

  async function load() {
    const sb = window.PaydDB?.cloud?.sb?.();
    if (!sb) { renderEmpty('Войдите в облако чтобы видеть акции'); return; }
    try {
      const [{ data: promo }, partners] = await Promise.all([
        sb.from('promo_campaigns').select('*').order('start_at', { ascending: false }),
        PaydDB.list('partners').catch(() => [])
      ]);
      allPromo = promo || [];
      allPartners = partners || [];
      render();
    } catch (e) { renderEmpty('Ошибка: ' + e.message); }
  }

  function renderEmpty(msg) {
    document.getElementById('pr-grid').innerHTML = `<div class="empty">${escapeHtml(msg)}</div>`;
  }

  function render() {
    const grid = document.getElementById('pr-grid');
    const now = new Date();
    if (!allPromo.length) {
      grid.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;opacity:.4;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        <div>Акций пока нет</div>
        <div style="font-size:12px;margin-top:6px;">Нажми «Новая акция»</div>
      </div>`;
    } else {
      grid.innerHTML = allPromo.map(p => {
        const expired = p.end_at && new Date(p.end_at) < now;
        const cls = (!p.is_active || expired) ? 'pr-card inactive' : 'pr-card';
        return `
          <div class="${cls}" data-id="${escapeHtml(p.id)}">
            <div class="pr-name">${escapeHtml(p.name)}</div>
            <div class="pr-desc">${escapeHtml(p.description || '')}</div>
            ${p.code ? `<span class="pr-code">${escapeHtml(p.code)}</span>` : ''}
            <div class="pr-meta">
              <div><div class="l">Тип</div><div class="v">${TYPE_LABELS[p.type] || p.type}: ${p.value || 0}${TYPE_UNITS[p.type] || ''}</div></div>
              <div><div class="l">Период</div><div class="v" style="font-size:11px;">${fmtDate(p.start_at)} — ${fmtDate(p.end_at)}</div></div>
            </div>
          </div>
        `;
      }).join('');
      grid.querySelectorAll('.pr-card').forEach(c => c.addEventListener('click', () => openEdit(c.dataset.id)));
    }

    document.getElementById('kpi-total').textContent = allPromo.length;
    document.getElementById('kpi-active').textContent = allPromo.filter(p => p.is_active && (!p.end_at || new Date(p.end_at) >= now)).length;
    document.getElementById('kpi-expired').textContent = allPromo.filter(p => p.end_at && new Date(p.end_at) < now).length;
    document.getElementById('pr-desc').textContent = 'Скидки, кешбэк, спец-условия · ' + allPromo.length + ' шт.';
  }

  const modal = document.getElementById('pr-modal');
  function populatePartners(selected) {
    const sel = document.getElementById('m-partner');
    sel.innerHTML = '<option value="">— любой —</option>' + allPartners.map(p =>
      `<option value="${escapeHtml(p.id || p.name)}"${selected === (p.id || p.name) ? ' selected' : ''}>${escapeHtml(p.name)}</option>`
    ).join('');
  }
  function openNew() {
    editingId = null;
    document.getElementById('pr-modal-title').textContent = 'Новая акция';
    document.getElementById('m-delete').style.display = 'none';
    ['m-name','m-desc','m-code','m-value','m-start','m-end'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-type').value = 'discount';
    document.getElementById('m-active').checked = true;
    populatePartners();
    modal.classList.add('open');
    setTimeout(() => document.getElementById('m-name').focus(), 50);
  }
  function openEdit(id) {
    const p = allPromo.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('pr-modal-title').textContent = 'Акция: ' + p.name;
    document.getElementById('m-delete').style.display = '';
    document.getElementById('m-name').value = p.name || '';
    document.getElementById('m-desc').value = p.description || '';
    document.getElementById('m-code').value = p.code || '';
    document.getElementById('m-type').value = p.type || 'discount';
    document.getElementById('m-value').value = p.value || '';
    document.getElementById('m-start').value = p.start_at || '';
    document.getElementById('m-end').value = p.end_at || '';
    document.getElementById('m-active').checked = p.is_active !== false;
    populatePartners(p.partner_id);
    modal.classList.add('open');
  }

  document.getElementById('btn-new-pr').addEventListener('click', openNew);
  document.getElementById('m-cancel').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  document.getElementById('m-save').addEventListener('click', async () => {
    const name = document.getElementById('m-name').value.trim();
    if (!name) { PaydApp.toast('Укажите название', 'error'); return; }
    const partnerVal = document.getElementById('m-partner').value;
    const data = {
      name,
      description: document.getElementById('m-desc').value.trim() || null,
      code: document.getElementById('m-code').value.trim() || null,
      type: document.getElementById('m-type').value,
      value: +document.getElementById('m-value').value || null,
      start_at: document.getElementById('m-start').value || null,
      end_at: document.getElementById('m-end').value || null,
      partner_id: partnerVal && /^[0-9a-f-]{36}$/i.test(partnerVal) ? partnerVal : null,
      is_active: document.getElementById('m-active').checked
    };
    const sb = PaydDB.cloud.sb();
    try {
      if (editingId) {
        const { error } = await sb.from('promo_campaigns').update(data).eq('id', editingId);
        if (error) throw error;
        PaydApp.toast('Акция обновлена', 'success');
      } else {
        const { error } = await sb.from('promo_campaigns').insert(data);
        if (error) throw error;
        PaydApp.toast('Акция создана', 'success');
      }
      modal.classList.remove('open');
      load();
    } catch (err) { PaydApp.toast('Ошибка: ' + err.message, 'error'); }
  });

  document.getElementById('m-delete').addEventListener('click', () => {
    if (!editingId) return;
    PaydApp.confirmDialog({
      title: 'Удалить акцию?',
      message: 'Действие нельзя отменить.',
      okText: 'Удалить',
      onOk: async () => {
        const sb = PaydDB.cloud.sb();
        await sb.from('promo_campaigns').delete().eq('id', editingId);
        modal.classList.remove('open');
        PaydApp.toast('Акция удалена', 'success');
        load();
      }
    });
  });

  load();
  setInterval(load, 15000);
</script>
</body>
</html>
