<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Служба безопасности — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .sb-grid { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
  @media (max-width: 1200px) { .sb-grid { grid-template-columns: 1fr; } }

  .queue-item { display: flex; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; align-items: flex-start; }
  .queue-item:hover { background: var(--surface-2); }
  .queue-item.selected { background: var(--primary-soft); border-left: 3px solid var(--primary); padding-left: 15px; }
  .queue-item .info { flex: 1; min-width: 0; }
  .queue-item .name { font-size: 13px; font-weight: 700; }
  .queue-item .meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .queue-item .right { text-align: right; }
  .queue-item .amount { font-size: 12px; font-weight: 700; }
  .queue-item .when { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .check-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .check-card.success { background: var(--success-soft); border-color: #a7f3d0; }
  .check-card.warning { background: var(--warning-soft); border-color: #fde68a; }
  .check-card.danger  { background: var(--danger-soft);  border-color: #fecaca; }
  .check-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .check-head .t { font-size: 12px; font-weight: 600; flex: 1; }
  .check-card .v { font-size: 16px; font-weight: 700; }
  .check-card .s { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 24px; padding: 16px 18px; }
  .data-grid .item .l { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: .04em; }
  .data-grid .item .v { font-size: 13px; font-weight: 600; margin-top: 2px; }

  .decision-actions { display: flex; gap: 10px; padding: 18px; border-top: 1px solid var(--border); background: var(--surface-2); border-radius: 0 0 var(--radius) var(--radius); }
  .decision-actions .btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; font-weight: 600; }

  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Служба безопасности</h1>
    <div class="desc" id="sb-desc">Очередь заявок на проверку</div>
  </div>
</div>

<div class="stat-grid cols-4 mb-4">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">В очереди</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-queue">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--success);">Одобрено сегодня</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-approved">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--danger);">Отклонено сегодня</div>
    <div class="stat-value" style="font-size: 22px; color: var(--danger);" id="kpi-rejected">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Принято решений</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-decided">0</div>
  </div>
</div>

<div class="sb-grid">

  <!-- LEFT: queue -->
  <div class="card">
    <div class="card-hd"><h3>Очередь</h3><span class="h-sub" id="queue-count">0</span></div>
    <div id="queue-list">
      <div class="empty">Загрузка...</div>
    </div>
  </div>

  <!-- RIGHT: detail -->
  <div class="card" id="detail-card">
    <div class="empty">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin:0 auto 14px;opacity:.4;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <div>Выберите заявку из очереди слева</div>
    </div>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'sb', title: 'Служба безопасности', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  const fmtRel = ts => { const d = (Date.now() - new Date(ts).getTime()) / 1000; if (d < 60) return 'только что'; if (d < 3600) return Math.round(d/60) + ' мин'; if (d < 86400) return Math.round(d/3600) + ' ч'; return Math.round(d/86400) + ' дн'; };
  const fmtDate = ts => { const d = new Date(ts); if (isNaN(d.getTime())) return '—'; const p = n => String(n).padStart(2, '0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}`; };
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  let allApps = [];
  let workflows = {};
  let selectedAppId = null;
  let todayStats = { approved: 0, rejected: 0, decided: 0, raw: [] };

  async function load() {
    // Все обращения к БД через PaydDB — никаких прямых sb.from(...) из HTML.
    const [apps, wfs, stats] = await Promise.all([
      PaydDB.list('applications').catch(() => []),
      PaydDB.list('workflows').catch(() => []),
      PaydDB.audit.todayStats().catch(() => ({ approved: 0, rejected: 0, decided: 0, raw: [] }))
    ]);
    allApps = apps;
    workflows = {};
    (Array.isArray(wfs) ? wfs : Object.values(wfs)).forEach(w => { if (w.app_id) workflows[w.app_id] = w; });
    todayStats = stats || { approved: 0, rejected: 0, decided: 0, raw: [] };
    render();
  }

  function getQueue() {
    return allApps.filter(a => {
      if (a.rejected || a.closed) return false;
      const wf = workflows[a.id];
      if (!wf) return true; // новая заявка → в очереди
      return wf.sb_passed !== true; // пока не одобрена СБ
    });
  }

  function render() {
    const queue = getQueue();
    document.getElementById('queue-count').textContent = queue.length;
    document.getElementById('kpi-queue').textContent = queue.length;
    document.getElementById('kpi-approved').textContent = todayStats.approved;
    document.getElementById('kpi-rejected').textContent = todayStats.rejected;
    document.getElementById('kpi-decided').textContent = todayStats.decided;
    document.getElementById('sb-desc').textContent = 'В очереди ' + queue.length + ' заявок';

    const list = document.getElementById('queue-list');
    if (!queue.length) {
      list.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" style="margin:0 auto 12px;opacity:.6;"><polyline points="20 6 9 17 4 12"/></svg>
        <div>Очередь пуста</div>
        <div style="font-size:12px;margin-top:6px;">Все заявки обработаны</div>
      </div>`;
      if (!selectedAppId) return;
    } else {
      list.innerHTML = queue.map(a => {
        const colors = ['c1','c2','c3','c4','c5','c6'];
        const cls = colors[Math.abs((a.client_name || '').length) % colors.length];
        const sel = a.id === selectedAppId ? ' selected' : '';
        const name = a.client_name || a.client?.name || '—';
        return `
          <div class="queue-item${sel}" data-id="${escapeHtml(a.id)}">
            <div class="avatar ${cls} sm">${name.split(/\s+/).map(p=>p[0]||'').slice(0,2).join('').toUpperCase()}</div>
            <div class="info">
              <div class="name">${escapeHtml(name)}</div>
              <div class="meta">#${escapeHtml(a.number || '')} · ${escapeHtml(a.product || '')}</div>
            </div>
            <div class="right">
              <div class="amount">${fmt(a.amount || a.calc?.price || 0)}</div>
              <div class="when">${fmtRel(a.ts || a.created_at)}</div>
            </div>
          </div>
        `;
      }).join('');
      list.querySelectorAll('.queue-item').forEach(item => {
        item.addEventListener('click', () => { selectedAppId = item.dataset.id; render(); });
      });
    }

    if (selectedAppId) renderDetail(allApps.find(a => a.id === selectedAppId));
  }

  function renderDetail(a) {
    if (!a) {
      document.getElementById('detail-card').innerHTML = `<div class="empty">Заявка не найдена</div>`;
      return;
    }
    const sale = +(a.amount || a.calc?.price) || 0;
    const down = +(a.down_payment || a.calc?.dpAmount) || 0;
    const term = a.term || a.calc?.term || 0;
    const monthly = +(a.monthly || a.calc?.monthly) || 0;

    document.getElementById('detail-card').innerHTML = `
      <div class="card-hd">
        <h3>Заявка #${escapeHtml(a.number || '')}</h3>
        <a href="zayavka.html?id=${encodeURIComponent(a.id)}" class="text-sm" style="color:var(--primary);font-weight:600;">Полная карточка →</a>
      </div>
      <div class="data-grid">
        <div class="item"><div class="l">Клиент</div><div class="v">${escapeHtml(a.client_name || a.client?.name || '—')}</div></div>
        <div class="item"><div class="l">Телефон</div><div class="v">${escapeHtml(a.client_phone || a.client?.phone || '—')}</div></div>
        <div class="item"><div class="l">Паспорт</div><div class="v">${escapeHtml(a.client_passport || '—')}</div></div>
        <div class="item"><div class="l">Адрес</div><div class="v">${escapeHtml(a.client_address || '—')}</div></div>
        <div class="item"><div class="l">Товар</div><div class="v">${escapeHtml(a.product || '—')}</div></div>
        <div class="item"><div class="l">Тип</div><div class="v">${escapeHtml(a.type || '—')}</div></div>
        <div class="item"><div class="l">Сумма</div><div class="v">${fmt(sale)}</div></div>
        <div class="item"><div class="l">Первый взнос</div><div class="v">${fmt(down)}</div></div>
        <div class="item"><div class="l">Срок</div><div class="v">${term} мес</div></div>
        <div class="item"><div class="l">Ежемесячно</div><div class="v">${fmt(monthly)}</div></div>
      </div>

      <div style="padding: 0 18px 18px;">
        <div class="check-grid">
          <div class="check-card success">
            <div class="check-head"><span class="t">Скоринг</span></div>
            <div class="v">— / 100</div>
            <div class="s">авто-скоринг подключается отдельно</div>
          </div>
          <div class="check-card">
            <div class="check-head"><span class="t">Ранее у клиента</span></div>
            <div class="v">${countAppsForClient(a)} ${plural(countAppsForClient(a), 'заявка', 'заявки', 'заявок')}</div>
            <div class="s">в системе</div>
          </div>
        </div>
      </div>

      <div class="decision-actions">
        <button class="btn danger" data-act="reject">✕ Отклонить</button>
        <button class="btn primary" data-act="approve">✓ Одобрить</button>
      </div>
    `;
    document.querySelector('[data-act="approve"]')?.addEventListener('click', e => { e.stopPropagation(); decide(a, true); });
    document.querySelector('[data-act="reject"]')?.addEventListener('click',  e => { e.stopPropagation(); decide(a, false); });
  }

  function plural(n, one, few, many) { n = Math.abs(n) % 100; const n1 = n % 10; if (n > 10 && n < 20) return many; if (n1 > 1 && n1 < 5) return few; if (n1 === 1) return one; return many; }
  function countAppsForClient(a) {
    const phone = a.client_phone || a.client?.phone;
    if (!phone) return 0;
    return allApps.filter(x => (x.client_phone || x.client?.phone) === phone).length;
  }

  async function decide(a, approve) {
    try {
      if (approve) {
        // Все детали (загрузка type, выставление step=contractStep,
        // запись sb.approved + stage.changed) централизованы в db.js.
        await PaydDB.workflows.approve(a.id);
        PaydApp.toast('Заявка одобрена', 'success');
      } else {
        // TODO: заменить prompt на модалку (см. AUDIT.md).
        const reason = (prompt('Причина отказа? (необязательно)') || '').trim();
        await PaydDB.workflows.reject(a.id, reason || null);
        PaydApp.toast('Заявка отклонена', 'error');
      }
      selectedAppId = null;
      load();
    } catch (e) {
      PaydApp.toast('Ошибка: ' + (e?.message || e), 'error');
    }
  }

  load();
  setInterval(load, 10000);
  if (window.PaydDB?.subscribe) {
    PaydDB.subscribe('applications', load);
    PaydDB.subscribe('workflows', load);
  }
</script>
</body>
</html>
