<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Выдача товара — Payd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .wh-row { display: grid; grid-template-columns: 90px 1fr 1fr 110px 130px; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); align-items: center; cursor: pointer; transition: background .12s; }
  .wh-row:hover { background: var(--surface-2); }
  .wh-row .num { font-family: 'Courier New', monospace; font-weight: 700; }
  .wh-row .name { font-weight: 700; font-size: 13px; }
  .wh-row .meta { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .wh-row .amount { font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
  .empty { padding: 60px 20px; text-align: center; color: var(--text-3); }
</style>
</head>
<body>

<div id="app-root">

<div class="page-head">
  <div>
    <h1>Выдача товара</h1>
    <div class="desc" id="wh-desc">Заявки готовые к выдаче</div>
  </div>
</div>

<div class="stat-grid cols-3 mb-4">
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">К выдаче</div>
    <div class="stat-value" style="font-size: 22px;" id="kpi-pending">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label" style="color: var(--success);">Выдано сегодня</div>
    <div class="stat-value" style="font-size: 22px; color: var(--success);" id="kpi-today">0</div>
  </div>
  <div class="stat" style="padding: 14px 16px;">
    <div class="stat-label">Сумма к выдаче</div>
    <div class="stat-value" style="font-size: 18px; color: var(--purple);" id="kpi-amount">0 ₽</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-search">
    <span class="si"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="wh-search" placeholder="Поиск по клиенту, номеру, товару..." />
  </div>
</div>

<div class="card">
  <div style="background: var(--surface-2); padding: 10px 18px; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; display: grid; grid-template-columns: 90px 1fr 1fr 110px 130px; gap: 12px; border-bottom: 1px solid var(--border);">
    <div>Заявка</div>
    <div>Клиент</div>
    <div>Товар</div>
    <div style="text-align:right;">Сумма</div>
    <div></div>
  </div>
  <div id="wh-list">
    <div class="empty">Загрузка...</div>
  </div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
  PaydApp.mountShell({ active: 'warehouse', title: 'Выдача', breadcrumbs: [] });

  const fmt = v => Math.round(+v || 0).toLocaleString('ru-RU').replace(/,/g, ' ') + ' ₽';
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

  let allApps = [];
  let workflows = {};
  let history = [];

  async function load() {
    const sb = PaydDB.cloud.sb();
    if (!sb) return;
    const today = new Date(new Date().setHours(0,0,0,0)).toISOString();
    const [apps, wfs, { data: hist }] = await Promise.all([
      PaydDB.list('applications').catch(() => []),
      PaydDB.list('workflows').catch(() => []),
      sb.from('application_history').select('*').gte('ts', today).eq('action', 'product.delivered')
    ]);
    allApps = apps;
    workflows = {};
    (Array.isArray(wfs) ? wfs : Object.values(wfs)).forEach(w => { if (w.app_id) workflows[w.app_id] = w; });
    history = hist || [];
    render();
  }

  function getQueue() {
    return allApps.filter(a => {
      if (a.rejected || a.closed) return false;
      const wf = workflows[a.id];
      // К выдаче: одобренные СБ + договор подписан + ещё не выданы
      return wf && wf.sb_passed && wf.step >= 3 && !wf.completed && !wf.delivered;
    });
  }

  function render() {
    const q = (document.getElementById('wh-search').value || '').toLowerCase().trim();
    const queue = getQueue();
    const filtered = q
      ? queue.filter(a => ((a.client_name || '') + ' ' + (a.number || '') + ' ' + (a.product || '')).toLowerCase().includes(q))
      : queue;

    const list = document.getElementById('wh-list');
    if (!filtered.length) {
      list.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin:0 auto 12px;opacity:.4;"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <div>${queue.length === 0 ? 'Нет заявок к выдаче' : 'По запросу ничего нет'}</div>
        <div style="font-size:12px;margin-top:6px;">Заявки появляются после подписания договора</div>
      </div>`;
    } else {
      list.innerHTML = filtered.map(a => {
        const phone = a.client_phone || a.client?.phone || '';
        return `
          <div class="wh-row" data-id="${escapeHtml(a.id)}">
            <div class="num">#${escapeHtml(a.number || '')}</div>
            <div>
              <div class="name">${escapeHtml(a.client_name || a.client?.name || '—')}</div>
              <div class="meta">${escapeHtml(phone)}</div>
            </div>
            <div>
              <div class="name" style="font-weight:600;">${escapeHtml(a.product || '—')}</div>
            </div>
            <div class="amount">${fmt(a.amount || a.calc?.price || 0)}</div>
            <div style="display:flex;gap:6px;justify-content:flex-end;">
              <button class="btn primary sm" data-act="deliver" data-no-handler="true">✓ Выдать</button>
            </div>
          </div>
        `;
      }).join('');
      list.querySelectorAll('.wh-row').forEach(r => {
        r.addEventListener('click', e => {
          if (e.target.closest('[data-act]')) return;
          location.href = 'zayavka.html?id=' + encodeURIComponent(r.dataset.id);
        });
      });
      list.querySelectorAll('[data-act="deliver"]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = btn.closest('.wh-row').dataset.id;
          deliverApp(id);
        });
      });
    }

    document.getElementById('kpi-pending').textContent = queue.length;
    document.getElementById('kpi-today').textContent = history.length;
    document.getElementById('kpi-amount').textContent = fmt(queue.reduce((s, a) => s + (+(a.amount || a.calc?.price) || 0), 0));
    document.getElementById('wh-desc').textContent = 'К выдаче · ' + queue.length + ' заявок';
  }

  async function deliverApp(id) {
    const a = allApps.find(x => x.id === id);
    if (!a) return;
    PaydApp.confirmDialog({
      title: 'Подтвердить выдачу?',
      message: 'Заявка #' + a.number + ' будет помечена как «Выдан клиенту».',
      okText: 'Выдать',
      onOk: async () => {
        const wf = workflows[a.id] || { app_id: a.id };
        wf.delivered = true;
        wf.step = Math.max(wf.step || 0, 8);
        try {
          await PaydDB.upsert('workflows', wf);
          await PaydDB.audit.log(a.id, 'product.delivered');
          PaydApp.toast('Товар выдан', 'success');
          load();
        } catch (err) { PaydApp.toast('Ошибка: ' + err.message, 'error'); }
      }
    });
  }

  document.getElementById('wh-search').addEventListener('input', render);

  load();
  setInterval(load, 15000);
  if (window.PaydDB?.subscribe) {
    PaydDB.subscribe('applications', load);
    PaydDB.subscribe('workflows', load);
  }
</script>
</body>
</html>
